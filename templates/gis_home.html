<!DOCTYPE html>
<html>
<head>
    <title>GIS Mapping Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #eef9f1;
            font-family: Arial, sans-serif;
        }
        .container {
            margin-top: 60px;
            text-align: center;
        }
        h1 {
            margin-bottom: 30px;
        }
        .btn-gis {
            width: 250px;
            margin: 15px;
            padding: 15px;
            font-size: 18px;
            border-radius: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🌿 GIS Mapping & Field Tools</h1>
    {% if session['role'] in ['Manager', 'Admin'] %}
        <a href="{{ url_for('gis.gis_draw') }}" class="btn btn-primary btn-gis">🗺️ GIS Mapping (Draw Polygon)</a><br>
        <a href="{{ url_for('gis.view_fields') }}" class="btn btn-success btn-gis">📄 View Saved Fields</a><br>
        <a href="{{ url_for('gis.add_polygon') }}" class="btn btn-warning btn-gis">➕ Add Polygon from File</a><br>
    {% endif %}
    <a href="{{ url_for('gis.map_all_fields') }}" class="btn btn-info btn-gis">🌍 View All Fields on Map</a><br>
    {% if session['role'] in ['Manager', 'Admin'] %}
        <a href="{{ url_for('recalc.recalculate_stress') }}" class="btn btn-danger btn-gis">♻️ Recalculate Stress Levels</a><br>
    {% endif %}
    <a href="/dashboard" class="btn btn-secondary btn-gis">⬅️ Back to Dashboard</a>
</div>
</body>
</html>
