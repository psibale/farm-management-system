<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>✏️ Edit Field</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link rel="stylesheet"
href="{{ url_for('static', filename='css/bootstrap.min.css') }}">

    <!-- Leaflet + Leaflet Draw -->
    <link rel="stylesheet"
      href="{{ url_for('static', filename='css/leaflet.css') }}">

    <link rel="stylesheet"
      href="{{ url_for('static', filename='css/leaflet.draw.css') }}">

    <style>
        body {
            background: #f6f9fb;
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        .card {
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        #map {
            height: 400px;
            border-radius: 12px;
            margin-top: 15px;
        }

        .info-box {
            font-size: 0.9rem;
            color: #6c757d;
        }

        .area-display {
            font-weight: 600;
            margin-top: 8px;
            font-size: 0.95rem;
        }

        .area-input {
            max-width: 150px;
            display: inline-block;
        }
    </style>
</head>

<body class="p-4">

<div class="container">

    <div class="card p-4">

        <h3 class="fw-bold mb-2">
            ✏️ Edit Field: {{ field['Field'] }}
        </h3>

        <p class="info-box">
            Drag polygon points to edit boundary. Area updates automatically or type a new area below.
        </p>

        <form method="POST">

            <!-- Crop -->
            <div class="mb-3">
                <label class="form-label">🌱 Crop</label>
                <input type="text"
                       name="crop"
                       value="{{ field['Crop'] }}"
                       class="form-control"
                       required>
            </div>

            <!-- Soil -->
            <div class="mb-3">
                <label class="form-label">🌍 Soil Type</label>
                <input type="text"
                       name="soil"
                       value="{{ field['Soil'] }}"
                       class="form-control"
                       required>
            </div>

            <!-- Hidden GeoJSON -->
            <input type="hidden" name="geojson" id="geojson">

            <!-- Map -->
            <div id="map"></div>

            <!-- Live Area Display + Manual Input -->
            <div class="area-display">
                Area (ha):
                <input type="number" step="0.01" id="areaInput" class="form-control area-input" />
            </div>

            <!-- Buttons -->
            <div class="d-flex gap-2 mt-4">

                <button type="submit" class="btn btn-success">
                    💾 Save Changes
                </button>

                <a href="{{ url_for('gis.view_fields') }}"
                   class="btn btn-secondary">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

<!-- Leaflet + Leaflet Draw + Turf -->
<script src="{{ url_for('static', filename='js/leaflet.js') }}"></script>
<script src="{{ url_for('static', filename='js/leaflet.draw.js') }}"></script>
<script src="{{ url_for('static', filename='js/turf.min.js') }}"></script>

<script>
    const map = L.map('map').setView([-13.9626, 33.7741], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    const geojsonInput = document.getElementById("geojson");
    const areaInput = document.getElementById("areaInput");

    // Load existing polygon(s)
    const existingGeoJSON = {{ field['GeoJSON'] | safe }};
    L.geoJSON(existingGeoJSON).eachLayer(layer => {
        drawnItems.addLayer(layer);
    });
    map.fitBounds(drawnItems.getBounds());

    // Helper to calculate total area in ha
    function calculateArea() {
        let totalArea = 0;
        drawnItems.eachLayer(layer => {
            totalArea += turf.area(layer.toGeoJSON());
        });
        return totalArea / 10000; // ha
    }

    // Update hidden GeoJSON + area input
    function updateGeoJSON() {
        const features = [];
        drawnItems.eachLayer(layer => {
            features.push(layer.toGeoJSON());
        });
        geojsonInput.value = JSON.stringify({ type: "FeatureCollection", features });
        areaInput.value = calculateArea().toFixed(2);
    }

    // Initialize
    updateGeoJSON();

    // Draw control
    const drawControl = new L.Control.Draw({
        draw: { polygon: true, polyline: false, rectangle: false, circle: false, marker: false, circlemarker: false },
        edit: { featureGroup: drawnItems }
    });
    map.addControl(drawControl);

    map.on(L.Draw.Event.CREATED, e => {
        drawnItems.addLayer(e.layer);
        updateGeoJSON();
    });

    map.on(L.Draw.Event.EDITED, e => {
        updateGeoJSON();
    });

    map.on(L.Draw.Event.DELETED, e => {
        updateGeoJSON();
    });

    // Manual area input scaling
    areaInput.addEventListener('change', () => {
        const targetArea = parseFloat(areaInput.value);
        if (isNaN(targetArea) || targetArea <= 0) return;

        drawnItems.eachLayer(layer => {
            const currentArea = turf.area(layer.toGeoJSON()) / 10000;
            const scaleFactor = Math.sqrt(targetArea / currentArea);

            const coords = layer.getLatLngs()[0].map(ll => {
                const center = layer.getBounds().getCenter();
                return [
                    center.lat + (ll.lat - center.lat) * scaleFactor,
                    center.lng + (ll.lng - center.lng) * scaleFactor
                ];
            });
            layer.setLatLngs([coords]);
        });

        updateGeoJSON();
    });
</script>

</body>
</html>
