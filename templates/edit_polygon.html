<!DOCTYPE html>
<html>
<head><title>Edit Field</title></head>
<body class="p-4">
    <div class="container">
        <h2>Edit Field: {{ field['Field Name'] }}</h2>
        <form method="POST">
            <div class="mb-3">
                <label>Crop</label>
                <input type="text" name="crop" value="{{ field['Crop'] }}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Soil</label>
                <input type="text" name="soil" value="{{ field['Soil'] }}" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">💾 Save</button>
            <a href="{{ url_for('gis.view_fields') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</body>
</html>
