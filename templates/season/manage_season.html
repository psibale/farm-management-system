<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Season Management</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <style>
        body { background-color: #e8f5e9; }
        .container { margin-top: 40px; }
        h2 { color: #2e7d32; }
        table th, table td { vertical-align: middle; }
    </style>
</head>
<body>
<div class="container">
    <h2>Season Management</h2>

    <!-- Active Season Switcher -->
    <form method="post" action="{{ url_for('season.set_active_season_route') }}" class="row g-3 align-items-center mt-4">
        <div class="col-auto">
            <label for="season" class="col-form-label">Active Season:</label>
        </div>
        <div class="col-auto">
            <select name="active_season" class="form-select" id="season" required>
                {% for s in all_seasons %}
                    <option value="{{ s }}" {% if s == current_season %}selected{% endif %}>{{ s }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Set Active Season</button>
        </div>
    </form>

    <!-- Add New Season Form -->
    <form method="post" action="{{ url_for('season.add_season') }}" class="mt-5">
        <h4>Add New Season</h4>
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Season Name</label>
                <input type="text" name="season_name" class="form-control" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Start Date</label>
                <input type="date" name="start_date" class="form-control" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">End Date</label>
                <input type="date" name="end_date" class="form-control" required>
            </div>
            <div class="col-md-2 d-grid">
                <label class="form-label invisible">Add</label>
                <button type="submit" class="btn btn-success">Add Season</button>
            </div>
        </div>
    </form>

    <!-- Season Table -->
    <div class="mt-5">
        <h4>Existing Seasons</h4>
        <table class="table table-bordered table-striped mt-3">
            <thead class="table-success">
                <tr>
                    <th>Season Name</th>
                    <th>Start Date</th>
                    <th>End Date</th>
                </tr>
            </thead>
            <tbody>
                {% for row in seasons %}
                <tr>
                    <td>{{ row["Season Name"] }}</td>
                    <td>{{ row["Start Date"] }}</td>
                    <td>{{ row["End Date"] }}</td>
                </tr>
                {% else %}
                <tr><td colspan="3" class="text-center">No seasons found.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary mt-4">← Back to Dashboard</a>
</div>
</body>
</html>
