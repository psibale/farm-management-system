{% extends 'layout.html' %}
{% block content %}

<div class="container mt-4">

    <h3 class="fw-bold mb-3">📊 Replant Priority Summary</h3>

    <div class="table-responsive">
        <table class="table table-bordered table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Priority</th>
                    <th>Total Fields</th>
                </tr>
            </thead>
            <tbody>
                {% for row in summary %}
                <tr>
                    <td>
                        <span class="badge
                        {{ 'bg-danger' if row.Priority=='High' else 'bg-warning' if row.Priority=='Medium' else 'bg-success' }}">
                            {{ row.Priority }}
                        </span>
                    </td>
                    <td>{{ row.Total_Fields }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <a href="{{ url_for('replant.progress_dashboard') }}" class="btn btn-secondary mt-3">← Back</a>

</div>

{% endblock %}
