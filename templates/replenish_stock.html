{% extends "layout.html" %}

{% block content %}

<div class="container py-4">

<!-- PAGE HEADER -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold">➕ Replenish Inventory Stock</h3>

    <a href="{{ url_for('inventory.dashboard') }}" class="btn btn-outline-secondary">
        ⬅ Back to Inventory
    </a>
</div>


<!-- FORM CARD -->
<div class="card shadow-sm border-0">

<div class="card-body">

<form method="POST">

<!-- ITEM SELECTION -->
<div class="mb-4">
<label class="form-label fw-semibold">Select Inventory Item</label>

<select name="item_name" class="form-select form-select-lg" required>
<option value="">-- Choose Item --</option>

{% for item in items %}
<option value="{{ item }}">{{ item }}</option>
{% endfor %}

</select>

<div class="form-text">
Select the item you want to add stock to.
</div>
</div>


<!-- QUANTITY -->
<div class="mb-4">

<label class="form-label fw-semibold">Quantity to Add</label>

<input type="number"
name="quantity"
class="form-control form-control-lg"
placeholder="Enter quantity"
required
min="1">

<div class="form-text">
Enter the number of units received into the store.
</div>

</div>


<!-- REMARKS -->
<div class="mb-4">

<label class="form-label fw-semibold">Remarks (Optional)</label>

<input type="text"
name="remarks"
class="form-control"
placeholder="Supplier, delivery note, or notes">

</div>


<!-- ACTION BUTTONS -->
<div class="d-flex justify-content-between">

<a href="{{ url_for('inventory.dashboard') }}"
class="btn btn-secondary">

⬅ Cancel

</a>

<button type="submit"
class="btn btn-success btn-lg">

✅ Add Stock

</button>

</div>

</form>

</div>
</div>

</div>

{% endblock %}
