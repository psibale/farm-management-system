<!DOCTYPE html>
<html>
<head>
    <title>Replenish Stock</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>➕ Replenish Stock</h2>
    <form method="POST">
        <div class="mb-3">
            <label for="item_name" class="form-label">Select Item</label>
            <select name="item_name" class="form-select" required>
                {% for item in items %}
                    <option value="{{ item }}">{{ item }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label for="quantity" class="form-label">Quantity to Add</label>
            <input type="number" name="quantity" class="form-control" required min="1">
        </div>
        <div class="mb-3">
            <label for="remarks" class="form-label">Remarks (optional)</label>
            <input type="text" name="remarks" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">Replenish</button>
        <a href="{{ url_for('inventory.dashboard') }}" class="btn btn-secondary">Back</a>
    </form>
</body>
</html>
