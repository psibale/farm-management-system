<!DOCTYPE html>
<html>
<head>
    <title>Issue Inventory Item</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h3>📦 Issue Item from Inventory</h3>
    <form method="post" class="mt-4">
        <div class="mb-3">
            <label for="item_name" class="form-label">Item:</label>
            <select name="item_name" class="form-select" required>
                {% for item in items %}
                    <option value="{{ item }}">{{ item }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label for="quantity" class="form-label">Quantity:</label>
            <input type="number" name="quantity" class="form-control" required min="1">
        </div>
        <div class="mb-3">
            <label for="issued_to" class="form-label">Issued To (Person or Department):</label>
            <input type="text" name="issued_to" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="remarks" class="form-label">Remarks:</label>
            <input type="text" name="remarks" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">🚚 Issue Item</button>
        <a href="{{ url_for('inventory.dashboard') }}" class="btn btn-secondary ms-2">⬅ Back</a>
    </form>
</div>
</body>
</html>
