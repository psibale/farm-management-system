{% extends 'layout.html' %}

{% block content %}
<div class="container py-4">
    <h3>📊 Monthly Summary - Cane Cutting</h3>
    {% if summary %}
        <table class="table table-bordered w-auto">
            <thead>
                <tr>
                    <th>Metric</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody>
                {% for key, value in summary.items() %}
                    <tr>
                        <td>{{ key }}</td>
                        <td>{{ value }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p>No records for this month.</p>
    {% endif %}
</div>
{% endblock %}
