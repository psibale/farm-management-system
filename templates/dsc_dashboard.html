{% extends 'layout.html' %}

{% block content %}

<!-- 🌙 DARK MODE + SIDEBAR STYLES -->
<style>
    body.light-mode {
        background: #f5f7fa;
        color: #222;
    }
    body.dark-mode {
        background: #121212;
        color: #e5e5e5;
    }

    /* --- FIXED SIDEBAR --- */
    .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: 260px;
        height: 100%;
        background: linear-gradient(180deg, #0d6efd, #003f9e);
        color: white;
        padding: 25px 20px;
        box-shadow: 3px 0 10px rgba(0,0,0,0.2);
        z-index: 9999;
    }
    .sidebar h4 {
        font-weight: bold;
        margin-bottom: 25px;
    }
    .sidebar a {
        color: white;
        text-decoration: none;
        display: block;
        padding: 12px 10px;
        margin-bottom: 5px;
        border-radius: 6px;
        font-size: 16px;
        font-weight: 500;
        transition: background .2s ease;
    }
    .sidebar a:hover {
        background: rgba(255,255,255,0.2);
    }

    /* MAIN CONTENT SHIFTED */
    .content-wrapper {
        margin-left: 280px;
        padding: 40px 20px;
    }

    /* Overview Cards */
    .overview-card {
        border-radius: 16px;
        padding: 25px;
        color: white;
        text-align: center;
        box-shadow: 0 6px 18px rgba(0,0,0,0.15);
        animation: fadeInUp .6s ease;
    }

    .bg-blue { background: #0d6efd; }
    .bg-green { background: #198754; }
    .bg-orange { background: #fd7e14; }
    .bg-purple { background: #6f42c1; }

    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<!-- FIXED SIDEBAR -->
<div class="sidebar">
    <h4>📄 DSC Menu</h4>

    <a href="{{ url_for('dsc.cane_cutting_form') }}">🪓 Cane Cutting</a>
    <a href="{{ url_for('dsc.cane_shifting_form') }}">🔄 Cane Shifting</a>
    <a href="{{ url_for('dsc.cane_scraping_form') }}">🧹 Cane Scraping</a>
    <a href="{{ url_for('dsc.seedcane_cutting_form') }}">🌱 Seedcane Cutting</a>
    <a href="{{ url_for('dsc.seedcane_chopping_form') }}">✂️ Seedcane Chopping</a>
    <a href="{{ url_for('dsc.planting_form') }}">🌾 Planting</a>
    <a href="{{ url_for('mill.mill_return_form') }}">🚛 Daily Mill Return</a>

    <hr style="border-color: rgba(255,255,255,0.3);">
    <a href="{{ url_for('dashboard') }}">⬅️ Back to Main Dashboard</a>
</div>

<!-- DARK MODE BUTTON -->
<div style="position: fixed; top: 10px; right: 10px; z-index: 9999;">
    <button id="darkModeBtn" class="btn btn-dark btn-sm">🌙 Dark Mode</button>
</div>

<script>
    // Dark mode toggle
    const btn = document.getElementById("darkModeBtn");
    btn.addEventListener("click", () => {
        document.body.classList.toggle("dark-mode");
        document.body.classList.toggle("light-mode");
        btn.textContent = document.body.classList.contains("dark-mode")
            ? "☀️ Light Mode"
            : "🌙 Dark Mode";
    });
</script>

<!-- MAIN CONTENT -->
<div class="content-wrapper">



    <!-- 📊 MILL RETURN ANALYTICS -->
<div class="mt-5">

    <h3 class="fw-bold mb-4">📊 Mill Return – Seasonal Performance</h3>

    <div class="card shadow-sm p-3">
        <iframe
            src="{{ url_for('mill.mill_return_tonnage_graph') }}"
            style="
                width: 100%;
                height: 460px;
                border: none;
                border-radius: 12px;
            ">
        </iframe>
    </div>

</div>


</div>

{% endblock %}
