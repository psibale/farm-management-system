{% extends "layout.html" %}
{% block content %}

<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>📚 Safety Training Records</h3>
        <a href="{{ url_for('safety.training_add') }}" class="btn btn-success">+ Add Training</a>
        <a href="{{ url_for('safety.dashboard') }}" class="btn btn-outline-light">← Dashboard</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <table class="table table-dark table-striped table-hover align-middle">
                <thead class="table-light text-dark">
                    <tr>
                        <th>Date</th>
                        <th>Training Topic</th>
                        <th>Trainer</th>
                        <th>Participants</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>
                    {% for t in training %}
                    <tr>
                        <td>{{ t.Date }}</td>
                        <td>{{ t.Topic }}</td>
                        <td>{{ t.Trainer }}</td>
                        <td>{{ t.Participants }}</td>
                        <td>
                            <a href="{{ url_for('safety.training_view', id=t.ID) }}" class="btn btn-sm btn-info">View</a>
                            <a href="{{ url_for('safety.training_edit', id=t.ID) }}" class="btn btn-sm btn-primary">Edit</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>

        </div>
    </div>

</div>
{% endblock %}
