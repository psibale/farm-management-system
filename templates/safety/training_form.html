{% extends "layout.html" %}
{% block content %}

<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>📚 {{ action }} Training</h3>
        <a href="{{ url_for('safety.training_list') }}" class="btn btn-outline-light">← Back</a>
    </div>

    <div class="card shadow-sm p-4">

        <form method="post">

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Training Date</label>
                    <input type="date" name="Date" value="{{ data.Date }}" class="form-control">
                </div>
                <div class="col-md-8">
                    <label class="form-label">Training Topic</label>
                    <input type="text" name="Topic" value="{{ data.Topic }}" class="form-control">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Trainer Name</label>
                <input type="text" name="Trainer" value="{{ data.Trainer }}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Participants (comma separated)</label>
                <textarea name="Participants" rows="3" class="form-control">{{ data.Participants }}</textarea>
            </div>

            <button class="btn btn-primary">Save Training</button>

        </form>

    </div>

</div>
{% endblock %}
