{% extends "layout.html" %}
{% block content %}

<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>📝 {{ action }} Incident</h3>
        <a href="{{ url_for('safety.incident_list') }}" class="btn btn-outline-light">
            ← Back to Incidents
        </a>
    </div>

    <div class="card shadow-sm p-4">

        <form method="post" enctype="multipart/form-data">

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Date</label>
                    <input type="date" name="Date" value="{{ data.Date }}" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Time</label>
                    <input type="time" name="Time" value="{{ data.Time }}" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Type</label>
                    <select name="Type" class="form-select">
                        <option {{ 'selected' if data.Type=='Near Miss' }}>Near Miss</option>
                        <option {{ 'selected' if data.Type=='Injury' }}>Injury</option>
                        <option {{ 'selected' if data.Type=='Hazard' }}>Hazard</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Location</label>
                <input type="text" name="Location" value="{{ data.Location }}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="Description" rows="4" class="form-control">{{ data.Description }}</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Upload Photo</label>
                <input type="file" name="Photo" class="form-control">
            </div>

            <button class="btn btn-primary">Save</button>
        </form>

    </div>
</div>

{% endblock %}
