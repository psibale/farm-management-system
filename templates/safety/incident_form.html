{% extends "layout.html" %}
{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='safety/safety.css') }}">

<div class="container py-4">
    <h3 class="mb-4">{{ action }} Incident</h3>

    <div class="card p-4 shadow-sm">
        <form method="post" enctype="multipart/form-data">

            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="Date" class="form-label">Date</label>
                    <input type="date" name="Date" id="Date" value="{{ data.Date or '' }}" class="form-control" required>
                </div>

                <div class="col-md-4">
                    <label for="Type" class="form-label">Type</label>
                    <select name="Type" id="Type" class="form-control">
                        {% set types = ['Near Miss', 'Injury', 'Hazard'] %}
                        {% for t in types %}
                            <option value="{{ t }}" {% if data.Type == t %}selected{% endif %}>{{ t }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-4">
                    <label for="Severity" class="form-label">Severity</label>
                    <select name="Severity" id="Severity" class="form-control">
                        {% set severities = ['Low', 'Medium', 'High'] %}
                        {% for s in severities %}
                            <option value="{{ s }}" {% if data.Severity == s %}selected{% endif %}>{{ s }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label for="Location" class="form-label">Location</label>
                <input type="text" name="Location" id="Location" value="{{ data.Location or '' }}" class="form-control">
            </div>

            <div class="mb-3">
                <label for="Description" class="form-label">Description</label>
                <textarea name="Description" id="Description" rows="4" class="form-control">{{ data.Description or '' }}</textarea>
            </div>

            <div class="mb-3">
                <label for="Actions_Taken" class="form-label">Actions Taken</label>
                <textarea name="Actions_Taken" id="Actions_Taken" rows="3" class="form-control">{{ data.Actions_Taken or '' }}</textarea>
            </div>

            <div class="mb-3">
                <label for="Assigned_To" class="form-label">Assigned To</label>
                <input type="text" name="Assigned_To" id="Assigned_To" value="{{ data.Assigned_To or '' }}" class="form-control">
            </div>

            <div class="mb-3">
                <label for="Status" class="form-label">Status</label>
                <select name="Status" id="Status" class="form-control">
                    {% set statuses = ['Open', 'In Progress', 'Closed', 'Completed'] %}
                    {% for st in statuses %}
                        <option value="{{ st }}" {% if data.Status == st %}selected{% endif %}>{{ st }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label for="Photo" class="form-label">Upload Photo(s)</label>
                <input type="file" name="Photo" id="Photo" class="form-control" multiple>
                {% if data.Photo %}
                    <small class="form-text text-muted">Existing: {{ data.Photo }}</small>
                {% endif %}
            </div>

            <button type="submit" class="btn btn-primary">{{ action }}</button>
            <a href="{{ url_for('safety.incident_list') }}" class="btn btn-secondary">Cancel</a>

        </form>
    </div>
</div>

{% endblock %}
