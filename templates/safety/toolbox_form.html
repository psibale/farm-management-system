{% extends "layout.html" %}
{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='safety/safety.css') }}">

<div class="container py-4">
    <h3>{{ action }} Toolbox Talk</h3>

    <form method="POST">
        <div class="mb-3">
            <label for="Date" class="form-label">Date</label>
            <input type="date" class="form-control" name="Date" id="Date" value="{{ data.Date or '' }}" required>
        </div>

        <div class="mb-3">
            <label for="Topic" class="form-label">Topic</label>
            <input type="text" class="form-control" name="Topic" id="Topic" value="{{ data.Topic or '' }}" required>
        </div>

        <div class="mb-3">
            <label for="Trainer" class="form-label">Trainer</label>
            <input type="text" class="form-control" name="Trainer" id="Trainer" value="{{ data.Trainer or '' }}">
        </div>

        <div class="mb-3">
            <label for="Participants" class="form-label">Participants</label>
            <input type="text" class="form-control" name="Participants" id="Participants" value="{{ data.Participants or '' }}">
        </div>

        <div class="mb-3">
            <label for="Notes" class="form-label">Notes</label>
            <textarea class="form-control" name="Notes" id="Notes">{{ data.Notes or '' }}</textarea>
        </div>

        <button type="submit" class="btn btn-success">{{ action }}</button>
        <a href="{{ url_for('safety.toolbox_list') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

{% endblock %}
