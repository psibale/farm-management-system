{% extends "layout.html" %}
{% block content %}

<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>🧰 {{ action }} Toolbox Talk</h3>
        <a href="{{ url_for('safety.toolbox_list') }}" class="btn btn-outline-light">← Back</a>
    </div>

    <div class="card shadow-sm p-4">

        <form method="post">

            <!-- Date + Topic -->
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Date</label>
                    <input type="date" name="Date" value="{{ data.Date }}" class="form-control" required>
                </div>

                <div class="col-md-8">
                    <label class="form-label">Topic</label>
                    <input type="text" name="Topic" value="{{ data.Topic }}" class="form-control" required>
                </div>
            </div>

            <!-- Trainer -->
            <div class="mb-3">
                <label class="form-label">Trainer</label>
                <input type="text" name="Trainer" value="{{ data.Trainer }}" class="form-control" required>
            </div>

            <!-- Participants -->
            <div class="mb-3">
                <label class="form-label">Participants (comma separated)</label>
                <textarea name="Participants" rows="3" class="form-control" placeholder="e.g. John, Peter, Thoko">{{ data.Participants }}</textarea>
            </div>

            <!-- NEW: Notes / Discussion Summary -->
            <div class="mb-3">
                <label class="form-label">Notes / What Was Discussed</label>
                <textarea name="Notes" rows="4" class="form-control" placeholder="Enter key discussion points, concerns raised, safety reminders shared...">
                    {{ data.Notes }}
                </textarea>
            </div>

            <div class="text-end">
                <button class="btn btn-primary">💾 Save Toolbox Talk</button>
            </div>

        </form>

    </div>

</div>

{% endblock %}
