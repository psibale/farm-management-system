{% extends "layout.html" %}
{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='safety/safety.css') }}">

<div class="container py-4">
    <h3 class="mb-4">{{ action }} Checklist</h3>

    <div class="card p-4">

        <form method="post">

            <div class="mb-3">
                <label>Date</label>
                <input type="date" name="Date" class="form-control" value="{{ data.Date }}" required>
            </div>

            <div class="mb-3">
                <label>Title</label>
                <input type="text" name="Title" class="form-control" value="{{ data.Title }}" required>
            </div>

            <div class="mb-3">
                <label>Completed By</label>
                <input type="text" name="Completed_By" class="form-control" value="{{ data.Completed_By }}">
            </div>

            <div class="mb-3">
                <label>Status</label>
                <select name="Status" class="form-control">
                    <option {% if data.Status == "Open" %}selected{% endif %}>Open</option>
                    <option {% if data.Status == "In Progress" %}selected{% endif %}>In Progress</option>
                    <option {% if data.Status == "Completed" %}selected{% endif %}>Completed</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Notes / Observations</label>
                <textarea name="Notes" rows="4" class="form-control">{{ data.Notes }}</textarea>
            </div>

            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{{ url_for('safety.checklist_list') }}" class="btn btn-secondary">Cancel</a>

        </form>

    </div>
</div>

{% endblock %}
