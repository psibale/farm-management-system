{% extends "layout.html" %}
{% block content %}

<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>✔ {{ action }} Checklist</h3>
        <a href="{{ url_for('safety.checklist_list') }}" class="btn btn-outline-light">← Back</a>
    </div>

    <div class="card shadow-sm p-4">

        <form method="post">

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Date</label>
                    <input type="date" name="Date" value="{{ data.Date }}" class="form-control">
                </div>

                <div class="col-md-8">
                    <label class="form-label">Checklist Type</label>
                    <input type="text" name="Type" value="{{ data.Type }}" class="form-control">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Supervisor</label>
                <input type="text" name="Supervisor" value="{{ data.Supervisor }}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Findings / Notes</label>
                <textarea name="Findings" rows="3" class="form-control">{{ data.Findings }}</textarea>
            </div>

            <button class="btn btn-primary">Save Checklist</button>
        </form>

    </div>

</div>

{% endblock %}
