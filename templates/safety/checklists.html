{% extends "layout.html" %}
{% block content %}

<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>✔ Safety Checklists</h3>

        <div>
            <a href="{{ url_for('safety.checklist_add') }}" class="btn btn-success me-2">+ New Checklist</a>
            <a href="{{ url_for('safety.dashboard') }}" class="btn btn-outline-light">← Dashboard</a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <table class="table table-dark table-striped table-hover align-middle">
                <thead class="table-light text-dark">
                    <tr>
                        <th>Date</th>
                        <th>Checklist Type</th>
                        <th>Supervisor</th>
                        <th>Findings</th>
                        <th style="width:120px;">Actions</th>
                    </tr>
                </thead>

                <tbody>
                    {% for c in checklists %}
                    <tr>
                        <td>{{ c.Date }}</td>
                        <td>{{ c.Type }}</td>
                        <td>{{ c.Supervisor }}</td>
                        <td>{{ c.Findings }}</td>
                        <td>
                            <a href="{{ url_for('safety.checklist_view', id=c.ID) }}" class="btn btn-sm btn-info">View</a>
                            <a href="{{ url_for('safety.checklist_edit', id=c.ID) }}" class="btn btn-sm btn-primary">Edit</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>

        </div>
    </div>

</div>

{% endblock %}
