{% extends 'layout.html' %}
{% block content %}
<div class="container py-4">
    <h3 class="text-center mb-4">🧰 Equipment Maintenance Entry</h3>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" class="mx-auto" style="max-width: 600px;">
        <div class="mb-3">
            <label>Equipment ID</label>
            <input type="text" name="equipment_id" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Maintenance Date</label>
            <input type="date" name="date" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Description of Work</label>
            <textarea name="description" class="form-control" rows="3" required></textarea>
        </div>
        <div class="mb-3">
            <label>Cost</label>
            <input type="number" step="0.01" name="cost" class="form-control">
        </div>
        <div class="mb-3">
            <label>Performed By</label>
            <input type="text" name="performed_by" class="form-control">
        </div>
        <div class="mb-3">
            <label>Status</label>
            <select name="status" class="form-select">
                <option value="Completed">Completed</option>
                <option value="Pending">Pending</option>
            </select>
        </div>
        <div class="mb-3">
            <label>Remarks</label>
            <textarea name="remarks" class="form-control" rows="2"></textarea>
        </div>

        <button type="submit" class="btn btn-success w-100">💾 Save Maintenance</button>
        <a href="{{ url_for('activities.equipment_manage') }}" class="btn btn-secondary w-100 mt-2">← Back</a>
    </form>
</div>
{% endblock %}
