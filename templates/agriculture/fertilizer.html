<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fertilizer Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        html, body {
            height: 100%;
        }
        .container-flex {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        #sidebar {
            width: 300px;
            background: linear-gradient(180deg, #1f2b38, #2c3e50);
            color: #ecf0f1;
            padding: 25px 20px;
            overflow-y: auto;
        }
        #sidebar h4 {
            font-weight: 700;
            margin-bottom: 25px;
        }
        #sidebar a {
            border-radius: 8px;
            text-align: left;
        }
        #sidebar a:hover {
            background-color: rgba(255,255,255,0.15);
        }

        /* Main content */
        #main {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            background-color: #f3f6fa;
        }
        h2 {
            font-weight: 700;
            border-left: 6px solid #28a745;
            padding-left: 12px;
            margin-bottom: 25px;
        }

        .card-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
            margin-bottom: 25px;
        }
        .form-label {
            font-weight: 600;
        }
    </style>
</head>

<body>
<div class="container-flex">

    <!-- Sidebar -->
    <div id="sidebar">
        <h4>Fertilizer Management</h4>
        <a href="{{ url_for('activities.fertilizer') }}" class="btn btn-outline-light w-100 mb-2">🧪 Fertilizer Entry</a>
        <a href="{{ url_for('activities.fertilizer_report') }}" class="btn btn-outline-light w-100 mb-2">📊 Fertilizer Report</a>
        <a href="{{ url_for('activities.farm_activities') }}" class="btn btn-outline-light w-100 mt-3">← Back to Activities</a>
    </div>

    <!-- Main Content -->
    <div id="main">
        <h2>Fertilizer Application Form</h2>

        {% if session['role'] in ['Manager','Data Clerk','Admin'] %}
        <form method="POST">

            <!-- General info -->
            <div class="card-section">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Date</label>
                        <input type="date" name="Date" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Field</label>
                        <input type="text" name="Field" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Area (Ha)</label>
                        <input type="text" name="Area (Ha)" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Crop</label>
                        <input type="text" name="Crop" class="form-control">
                    </div>
                </div>
            </div>

            <!-- Basal + Top Dressing -->
            <div class="row">
                <!-- Basal -->
                <div class="col-md-6">
                    <div class="card-section">
                        <h5 class="mb-3 text-primary">Basal Dressing</h5>
                        <div class="mb-2">
                            <label class="form-label">DAP (Bags)</label>
                            <input type="number" name="DAP" class="form-control" min="0">
                        </div>
                        <div class="mb-2">
                            <label class="form-label">SA (Bags)</label>
                            <input type="number" name="SA" class="form-control" min="0">
                        </div>
                        <div class="mb-2">
                            <label class="form-label">MOP (Bags)</label>
                            <input type="number" name="MOP" class="form-control" min="0">
                        </div>
                        <div class="mb-2">
                            <label class="form-label">Zinc (Bags)</label>
                            <input type="number" name="Zinc" class="form-control" min="0">
                        </div>
                    </div>
                </div>

                <!-- Top Dressing -->
                <div class="col-md-6">
                    <div class="card-section">
                        <h5 class="mb-3 text-success">Top Dressing</h5>
                        <label class="form-label">UREA (Bags)</label>
                        <input type="number" name="UREA" class="form-control" min="0">
                    </div>
                </div>
            </div>

            <!-- Labour -->
            <div class="card-section">
                <label class="form-label">Mandays</label>
                <input type="number" name="Mandays" class="form-control w-25" min="0">
            </div>

            <input type="hidden" name="Season" value="{{ season }}">
            <button type="submit" class="btn btn-success btn-lg">💾 Save Entry</button>
        </form>
        {% endif %}

    </div>
</div>
</body>
</html>
