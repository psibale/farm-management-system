<!DOCTYPE html>
<html>
<head>
    <title>Tractor Operations</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f4f6f8;
            padding: 20px;
        }
        .form-section {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            margin: auto;
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
        }
        .btn-group {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="form-section">
        <h2>🚜 Tractor Operations</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% if session['role'] in ['Tractor Clerk', 'Admin'] %}
        <form method="POST">
            <div class="row mb-3">
                <div class="col">
                    <label for="Date" class="form-label">Date</label>
                    <input type="date" name="Date" class="form-control" required>
                </div>
                <div class="col">
                    <label for="Tractor Number" class="form-label">Tractor Number</label>
                    <input type="text" name="Tractor Number" class="form-control" required>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col">
                    <label for="Operator" class="form-label">Operator</label>
                    <input type="text" name="Operator" class="form-control" required>
                </div>
                <div class="col">
                    <label for="Field" class="form-label">Field</label>
                    <input type="text" name="Field" class="form-control" required>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col">
                    <label for="Activity" class="form-label">Activity</label>
                    <input type="text" name="Activity" class="form-control" required>
                </div>
                <div class="col">
                    <label for="Fuel Used" class="form-label">Fuel Used (L)</label>
                    <input type="number" step="0.01" name="Fuel Used" class="form-control">
                </div>
            </div>
            <div class="row mb-3">
                <div class="col">
                    <label for="Hour Meter Open" class="form-label">Hour Meter Open</label>
                    <input type="number" step="0.01" name="Hour Meter Open" class="form-control" required>
                </div>
                <div class="col">
                    <label for="Hour Meter Closed" class="form-label">Hour Meter Closed</label>
                    <input type="number" step="0.01" name="Hour Meter Closed" class="form-control" required>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col">
                    <label for="Area" class="form-label">Area (ha)</label>
                    <input type="number" step="0.01" name="Area" class="form-control" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="Remarks" class="form-label">Remarks</label>
                <textarea name="Remarks" class="form-control" rows="2"></textarea>
            </div>
            <div class="mb-3">
                <label for="Season" class="form-label">Season</label>
                <input type="text" name="Season" class="form-control" value="{{ season }}" readonly>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn btn-primary">Save Operation</button>
        {% endif %}
                <a href="{{ url_for('activities.tractor_operations_report') }}" class="btn btn-info">📊 View Report</a>
                <a href="{{ url_for('agriculture.agriculture_home') }}" class="btn btn-secondary">← Back</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
