<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Farm Activities</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f0f2f5;
            padding: 40px;
            font-family: Arial, sans-serif;
        }
        .activity-card {
            max-width: 400px;
            margin: auto;
            padding: 30px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .btn-activity {
            width: 100%;
            height: 50px;
            font-size: 16px;
            margin-bottom: 15px;
        }
        .btn-purple {
            background-color: purple;
            color: white;
        }
    </style>
</head>
<body>

<div class="activity-card">
    <h3 class="text-center mb-4">Farm Activities</h3>

    {% if session['role'] in ['Manager', 'Data Clerk', 'Admin'] %}
        <a href="{{ url_for('activities.planting') }}" class="btn btn-success btn-activity">🌱 Planting</a>
        <a href="{{ url_for('activities.weeding') }}" class="btn btn-primary btn-activity">🌾 Weeding</a>
    {% endif %}

    <a href="{{ url_for('activities.irrigation') }}" class="btn btn-info btn-activity">💧 Irrigation</a>
    <a href="{{ url_for('activities.pest_disease') }}" class="btn btn-danger btn-activity">🐛 Pest & Disease</a>
    <a href="{{ url_for('activities.herbicide') }}" class="btn btn-secondary btn-activity">🌿 Herbicide</a>
    <a href="{{ url_for('activities.fertilizer') }}" class="btn btn-dark btn-activity">🧪 Fertilizer</a>
    <a href="{{ url_for('activities.harvesting_home') }}" class="btn btn-purple btn-activity"> 🏭Harvesting</a>
   <a href="{{ url_for('agriculture.agriculture_home') }}" class="btn btn-outline-dark btn-activity">← Back</a>
</div>

</body>
</html>
