<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Farm Activities</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background-color: #eef1f4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        .activities-wrapper {
            max-width: 900px;
            margin: auto;
        }

        h2 {
            font-weight: 700;
            margin-bottom: 30px;
        }

        .tile-btn {
            background: #ffffff;
            border: none;
            border-radius: 16px;
            padding: 40px 15px;
            font-size: 20px;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #1d1d1d;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            transition: all 0.25s ease-in-out;
        }

        .tile-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            text-decoration: none;
        }

        .tile-icon {
            font-size: 38px;
            margin-bottom: 12px;
        }

        /* Back button */
        .back-btn {
            margin-top: 40px;
            font-size: 18px;
        }
    </style>
</head>

<body>

<div class="container activities-wrapper text-center">

    <h2>⚙️ Farm Activities</h2>

    <div class="row g-4">

        {% if session['role'] in ['Manager', 'Data Clerk', 'Admin'] %}
        <div class="col-md-4">
            <a href="{{ url_for('activities.planting') }}" class="tile-btn">
                <span class="tile-icon">🌱</span>
                Planting
            </a>
        </div>

        <div class="col-md-4">
            <a href="{{ url_for('activities.weeding') }}" class="tile-btn">
                <span class="tile-icon">🌾</span>
                Weeding
            </a>
        </div>
        {% endif %}

        <div class="col-md-4">
            <a href="{{ url_for('activities.irrigation') }}" class="tile-btn">
                <span class="tile-icon">💧</span>
                Irrigation
            </a>
        </div>

        <div class="col-md-4">
            <a href="{{ url_for('activities.pest_disease') }}" class="tile-btn">
                <span class="tile-icon">🐛</span>
                Pest & Disease
            </a>
        </div>

        <div class="col-md-4">
            <a href="{{ url_for('activities.herbicide') }}" class="tile-btn">
                <span class="tile-icon">🌿</span>
                Herbicide
            </a>
        </div>

        <div class="col-md-4">
            <a href="{{ url_for('activities.fertilizer') }}" class="tile-btn">
                <span class="tile-icon">🧪</span>
                Fertilizer
            </a>
        </div>

        <div class="col-md-4">
            <a href="{{ url_for('activities.harvesting_home') }}" class="tile-btn">
                <span class="tile-icon">🏭</span>
                Harvesting
            </a>
        </div>

    </div>

    <a href="{{ url_for('agriculture.agriculture_home') }}"
       class="btn btn-outline-dark back-btn">
        ← Back
    </a>

</div>

</body>
</html>
