<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Harvesting Activities</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">

    <style>
        body {
            background: linear-gradient(135deg, #dce7f7, #f7fafc);
            min-height: 100vh;
            padding: 40px;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            text-align: center;
            margin-bottom: 40px;
        }

        /* Tile styling */
        .tile {
            background: #fff;
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 6px 14px rgba(0,0,0,0.1);
            transition: 0.3s ease;
            cursor: pointer;
        }

        .tile:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 22px rgba(0,0,0,0.15);
        }

        .tile-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .tile-title {
            font-size: 20px;
            font-weight: 600;
            color: #222;
        }

        /* Colors for different tiles */
        .tile-green { border-left: 6px solid #28a745; }
        .tile-blue { border-left: 6px solid #007bff; }
        .tile-orange { border-left: 6px solid #fd7e14; }
        .tile-purple { border-left: 6px solid #6f42c1; }
        .tile-red { border-left: 6px solid #dc3545; }
        .tile-dark { border-left: 6px solid #343a40; }

        a {
            text-decoration: none;
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .tile {
                margin-bottom: 20px;
            }
        }
    </style>
</head>

<body>

    <h2 class="page-title">🌾 Harvesting Section Dashboard</h2>

    <div class="container">
        <div class="row g-4">

            <!-- Harvest Program Dashboard -->
            <div class="col-md-4 col-sm-6">
                <a href="{{ url_for('activities.harvest_program_dashboard') }}">
                    <div class="tile tile-red">
                        <div class="tile-icon">📋</div>
                        <div class="tile-title">Harvest Program Dashboard</div>
                    </div>
                </a>
            </div>

            <!-- Cane Cutting -->
            <div class="col-md-4 col-sm-6">
                <a href="{{ url_for('activities.cane_cutting') }}">
                    <div class="tile tile-green">
                        <div class="tile-icon">🚜</div>
                        <div class="tile-title">Cane Cutting</div>
                    </div>
                </a>
            </div>

            <!-- Haulage -->
            <div class="col-md-4 col-sm-6">
                <a href="{{ url_for('activities.haulage') }}">
                    <div class="tile tile-blue">
                        <div class="tile-icon">🚛</div>
                        <div class="tile-title">Haulage</div>
                    </div>
                </a>
            </div>

            {% if session['role'] in ['Manager', 'Mill & Safety', 'Admin'] %}
            <!-- ERS Entry -->
            <div class="col-md-4 col-sm-6">
                <a href="{{ url_for('activities.ers_entry') }}">
                    <div class="tile tile-orange">
                        <div class="tile-icon">🧮</div>
                        <div class="tile-title">ERS% Entry</div>
                    </div>
                </a>
            </div>
            {% endif %}

            <!-- ERS Report -->
            <div class="col-md-4 col-sm-6">
                <a href="{{ url_for('activities.ers_report') }}">
                    <div class="tile tile-purple">
                        <div class="tile-icon">📊</div>
                        <div class="tile-title">ERS% Report</div>
                    </div>
                </a>
            </div>

            <!-- Back to Activities -->
            <div class="col-md-4 col-sm-6">
                <a href="{{ url_for('activities.farm_activities') }}">
                    <div class="tile tile-dark">
                        <div class="tile-icon">↩️</div>
                        <div class="tile-title">Back to Activities</div>
                    </div>
                </a>
            </div>

        </div>
    </div>

</body>
</html>
