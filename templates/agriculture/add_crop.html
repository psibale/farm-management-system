{% extends 'layout.html' %}

{% block content %}
<div class="container py-5">

<div class="card shadow-sm mx-auto"
     style="max-width:700px; border-radius:20px;">

<div class="card-header bg-success text-white">
    <h4 class="mb-0">🌱 Add Crop Record</h4>
</div>

<div class="card-body">

<form method="POST">

<!-- Field -->
<div class="mb-3">
<label class="form-label">Field</label>
<input type="text"
       name="field"
       class="form-control"
       placeholder="e.g. DG01000"
       required>
</div>

<!-- Variety -->
<div class="mb-3">
<label class="form-label">Variety</label>
<select name="variety"
        class="form-select"
        required>

    <option value="">-- Select Variety --</option>

    {% for variety in varieties %}
    <option value="{{ variety }}">
        {{ variety }}
    </option>
    {% endfor %}

</select>
</div>

<!-- Planting Date -->
<div class="mb-3">
<label class="form-label">Planting Date</label>
<input type="date"
       name="planting_date"
       class="form-control"
       required>
</div>

<!-- Status (optional, can later be auto-calculated too) -->
<div class="mb-3">
<label class="form-label">Status</label>
<select name="status"
        class="form-select">

    <option value="Active">Active</option>
    <option value="Harvested">Harvested</option>
    <option value="Replanted">Replanted</option>

</select>
</div>

<!-- Remarks -->
<div class="mb-3">
<label class="form-label">Remarks</label>
<textarea name="remarks"
          rows="3"
          class="form-control"
          placeholder="Optional notes..."></textarea>
</div>

<!-- Buttons -->
<div class="d-grid gap-2">

    <button type="submit" class="btn btn-success">
        💾 Save Crop Record
    </button>

    <a href="{{ url_for('agriculture.crop_management') }}"
       class="btn btn-outline-secondary">
        ← Back to Crop Management
    </a>

</div>

</form>

</div>
</div>

</div>
{% endblock %}
