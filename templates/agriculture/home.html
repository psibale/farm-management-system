<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Agriculture Dashboard</title>

<!-- Bootstrap -->
<link rel="stylesheet"
      href="{{ url_for('static', filename='css/bootstrap.min.css') }}">

<!-- FontAwesome Icons -->
<link rel="stylesheet"
href="{{ url_for('static', filename='css/all.min.css') }}">

<style>
    /* BODY & FONT */
    body {
        font-family: "Segoe UI", sans-serif;
        margin: 0;
        padding: 40px;
        transition: background 0.4s, color 0.4s;
        background-color: #f4f6f8;
    }

    body.dark {
        background-color: #0d1117;
        color: #e6edf3;
    }

    h1.section-title {
        text-align: center;
        margin-bottom: 50px;
        font-weight: 700;
        font-size: 2.2rem;
        color: inherit;
    }

    /* GRID LAYOUT */
    .dashboard-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 30px;
        align-items: stretch;
    }

    /* TILE STYLES */
    .tile {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 25px;
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.12);
        text-decoration: none;
        color: #222;
        font-weight: 600;
        font-size: 1.1rem;
        transition: all 0.25s ease;
        min-height: 180px;
        text-align: center;
    }

    body.dark .tile {
        background: rgba(25,25,25,0.85);
        color: #e6edf3;
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .tile i {
        font-size: 3.2rem;
        margin-bottom: 15px;
        transition: all 0.25s ease;
    }

    .tile:hover {
        transform: translateY(-6px);
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        background: #f0f4f8;
    }

    body.dark .tile:hover {
        background: rgba(50,50,50,0.85);
    }

    /* TILE COLORS */
    .tile-success i { color: #28a745; }
    .tile-primary i { color: #007bff; }
    .tile-warning i { color: #ffc107; }
    .tile-danger i { color: #dc3545; }
    .tile-dark i { color: #343a40; }
    .tile-purple i { color: purple; }
    .tile-info i { color: #17a2b8; }

    /* BACK BUTTON */
    .back-btn {
        grid-column: 1 / -1;
        justify-self: center;
        background: #6c757d;
        color: #fff;
        padding: 18px 30px;
        border-radius: 14px;
        font-weight: 600;
        font-size: 1.1rem;
        text-decoration: none;
        transition: transform 0.25s, box-shadow 0.25s, background 0.25s;
    }
    .back-btn:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 25px rgba(0,0,0,0.25);
        background: #5a6268;
        color: #fff;
    }

    /* DARK MODE TOGGLE */
    .dark-toggle {
        position: fixed;
        top: 30px;
        right: 30px;
        background: #ffc107;
        border: none;
        padding: 12px 20px;
        font-size: 1rem;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
        box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        transition: all 0.25s ease;
    }

    .dark-toggle:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
</style>
</head>
<body id="body">

<h1 class="section-title">🌱 Agriculture Dashboard</h1>

<!-- DARK MODE TOGGLE -->
<button class="dark-toggle" id="darkToggle">🌙 Dark Mode</button>

<div class="dashboard-grid">

    {% if session['role'] in ['Manager', 'Mill & Safety', 'Admin'] %}
        <a href="/agriculture/fields" class="tile tile-success">
            <i class="fas fa-map"></i>
            <h3>Field Registration</h3>
        </a>
    {% endif %}

    <a href="{{ url_for('agriculture.crop_management') }}" class="tile tile-dark">
        <i class="fas fa-leaf"></i>
        <h3>Crop Management</h3>
    </a>


    <a href="/agriculture/crop-estimates" class="tile tile-warning">
        <i class="fas fa-chart-line"></i>
        <h3>Crop Estimates</h3>
    </a>

    <a href="{{ url_for('agriculture.crop_estimate_progress') }}" class="tile tile-purple">
        <i class="fas fa-spinner"></i>
        <h3>Crop Estimate Progress</h3>
    </a>

    <a href="/agriculture/activities" class="tile tile-primary">
        <i class="fas fa-tractor"></i>
        <h3>Farm Activities</h3>
    </a>

    <a href="{{ url_for('agriculture.tractor_operations') }}" class="tile tile-dark">
        <i class="fas fa-gears"></i>
        <h3>Tractor Operations</h3>
    </a>

    <a href="{{ url_for('agriculture.field_reports') }}" class="tile tile-success">
        <i class="fas fa-clipboard-list"></i>
        <h3>Field Reports</h3>
    </a>

    <a href="{{ url_for('programme.programme_schedule') }}" class="tile tile-info">
        <i class="fas fa-calendar-week"></i>
        <h3>Weekly Programme</h3>
    </a>

    <a href="{{ url_for('replant.progress_dashboard') }}" class="tile tile-success">
    <i class="fas fa-seedling"></i>
    <h3>Replant Planning</h3>
</a>

    <!-- Back button spanning grid -->
    <a href="/dashboard" class="back-btn">
        ← Back
    </a>
</div>

<script>
    // Dark Mode Toggle
    const body = document.getElementById("body");
    const toggle = document.getElementById("darkToggle");

    // Load saved preference
    if(localStorage.getItem("theme") === "dark") {
        body.classList.add("dark");
        toggle.innerText = "☀️ Light Mode";
    }

    toggle.addEventListener("click", () => {
        body.classList.toggle("dark");
        if(body.classList.contains("dark")) {
            localStorage.setItem("theme", "dark");
            toggle.innerText = "☀️ Light Mode";
        } else {
            localStorage.setItem("theme", "light");
            toggle.innerText = "🌙 Dark Mode";
        }
    });
</script>

</body>
</html>
