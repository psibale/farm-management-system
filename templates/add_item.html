<!-- templates/add_item.html -->
{% extends 'layout.html' %}

{% block content %}

<div class="container py-4">

<!-- PAGE HEADER -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold">➕ Add Inventory Item</h3>

    <a href="{{ url_for('inventory.dashboard') }}" class="btn btn-outline-secondary">
        ⬅ Back to Inventory
    </a>
</div>


<!-- FORM CARD -->
<div class="card shadow-sm border-0">

<div class="card-body">

<form method="POST">

<div class="row">

<!-- ITEM NAME -->
<div class="col-md-6 mb-4">
<label class="form-label fw-semibold">Item Name</label>

<input type="text"
name="item_name"
class="form-control form-control-lg"
placeholder="Enter item name"
required>

<div class="form-text">
Example: Respirators, Harvesting Tags, Gloves
</div>
</div>


<!-- CATEGORY -->
<div class="col-md-6 mb-4">
<label class="form-label fw-semibold">Category</label>

<input type="text"
name="category"
class="form-control form-control-lg"
placeholder="Example: PPE, Stationery, Chemicals">

<div class="form-text">
Group similar items together for better organization.
</div>
</div>


<!-- QUANTITY -->
<div class="col-md-4 mb-4">
<label class="form-label fw-semibold">Opening Quantity</label>

<input type="number"
name="quantity"
class="form-control form-control-lg"
placeholder="0"
required>

</div>


<!-- UNIT -->
<div class="col-md-4 mb-4">
<label class="form-label fw-semibold">Unit</label>

<input type="text"
name="unit"
class="form-control form-control-lg"
placeholder="e.g., Pieces, Litres, Kg">

</div>


<!-- REORDER LEVEL -->
<div class="col-md-4 mb-4">
<label class="form-label fw-semibold">Reorder Level</label>

<input type="number"
name="reorder_level"
class="form-control form-control-lg"
placeholder="Minimum stock level">

<div class="form-text">
System alerts when stock falls below this level.
</div>

</div>

</div>


<!-- BUTTONS -->
<div class="d-flex justify-content-between mt-3">

<a href="{{ url_for('inventory.dashboard') }}"
class="btn btn-secondary">

⬅ Cancel

</a>

<button type="submit"
class="btn btn-success btn-lg">

💾 Save Item

</button>

</div>

</form>

</div>
</div>

</div>

{% endblock %}
