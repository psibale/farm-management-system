<!-- templates/add_polygon.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Add Field Polygon</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #fffceb;
        }
        .container {
            max-width: 700px;
            margin-top: 60px;
        }
        textarea {
            font-family: monospace;
        }
    </style>
</head>
<body>
<div class="container">
    <h2 class="mb-4">➕ Add Polygon from File</h2>

    <form method="POST" action="{{ url_for('gis.save_polygon') }}">
        <div class="mb-3">
            <label for="field_name" class="form-label">Field Name:</label>
            <input type="text" class="form-control" id="field_name" name="field_name" required>
        </div>

        <div class="mb-3">
            <label for="geojson" class="form-label">Paste GeoJSON:</label>
            <textarea class="form-control" id="geojson" name="geojson" rows="10" required></textarea>
        </div>

        <button type="submit" class="btn btn-success">💾 Save Polygon</button>
        <a href="{{ url_for('gis_home') }}" class="btn btn-secondary">⬅ Back</a>
    </form>
</div>
</body>
</html>
