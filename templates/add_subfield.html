{% extends "layout.html" %}

{% block content %}
<div class="container py-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">➕ Add Sub-field for {{ field_name }}</h4>

        <a href="{{ url_for('gis.view_fields') }}" class="btn btn-outline-secondary btn-sm">
            ⬅ Back
        </a>
    </div>

    <form method="POST" action="{{ url_for('gis.save_subfield') }}">

        <input type="hidden" name="parent_field" value="{{ field_name }}">
        <textarea name="geojson" id="geojson" hidden></textarea>

        <!-- Sub-field Name -->
        <div class="mb-3">
            <label class="form-label">Sub-field Name</label>
            <input type="text" name="sub_field" class="form-control"
                   value="{{ sub_name }}" readonly>
        </div>

        <!-- Map -->
        <div class="mb-3">
            <label class="form-label">Draw Sub-field</label>
            <div id="map" style="height: 400px; border-radius: 10px;"></div>
        </div>

        <!-- Area -->
        <div class="mb-3">
            <label class="form-label">Area (Ha)</label>
            <input type="number" step="0.01" name="area" id="area"
                   class="form-control" readonly>
        </div>
            <div class="mb-3">
            <label class="form-label">Or Enter Area (Ha)</label>
            <input type="number" step="0.01" id="manual_area" class="form-control"
                   placeholder="e.g. 5">
        </div>

        <button type="button" class="btn btn-primary btn-sm mb-3"
                onclick="generatePolygon()">
            ⚡ Generate from Area
        </button>

        <button class="btn btn-success">💾 Save Sub-field</button>

    </form>
    <form method="POST"
      action="{{ url_for('gis.auto_split_field') }}"
      style="display:inline;">

    <input type="hidden" name="field" value="{{ field_name }}">

    <input type="number" name="parts"
           placeholder="No. parts"
           min="2" required
           class="form-control form-control-sm d-inline"
           style="width:120px; display:inline;">

    <button type="submit" class="btn btn-info btn-sm">
        ⚡ Auto Split
    </button>
</form>
</div>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>
<script src="https://unpkg.com/leaflet-geometryutil"></script>

<script>
var map = L.map('map').setView([-13.98, 33.77], 13);

// Base map
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

// Feature group
var drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

// 🔥 Show parent field
var parentGeo = JSON.parse('{{ parent_geojson | safe }}');

var parentLayer = L.geoJSON(parentGeo, {
    style: {
        color: "black",
        weight: 3,
        fillOpacity: 0.05
    }
}).addTo(map);

// Zoom to parent
map.fitBounds(parentLayer.getBounds());

// Draw controls
var drawControl = new L.Control.Draw({
    draw: {
        polygon: true,
        rectangle: true,
        circle: false,
        marker: false,
        polyline: false
    },
    edit: {
        featureGroup: drawnItems
    }
});
map.addControl(drawControl);

// On draw
map.on(L.Draw.Event.CREATED, function (event) {
    var layer = event.layer;
    drawnItems.clearLayers();
    drawnItems.addLayer(layer);

    var geojson = layer.toGeoJSON();
    document.getElementById('geojson').value = JSON.stringify(geojson);

    var latlngs = layer.getLatLngs()[0];
    var area = L.GeometryUtil.geodesicArea(latlngs) / 10000;

    document.getElementById('area').value = area.toFixed(2);
});

function generatePolygon() {
    let areaHa = parseFloat(document.getElementById("manual_area").value);

    if (!areaHa || areaHa <= 0) {
        alert("Enter a valid area");
        return;
    }

    // Convert hectares to m²
    let areaM2 = areaHa * 10000;

    // Get center of parent field
    let bounds = parentLayer.getBounds();
    let center = bounds.getCenter();

    // Create simple square (approx)
    let side = Math.sqrt(areaM2); // meters

    let latOffset = side / 111320;
    let lngOffset = side / (111320 * Math.cos(center.lat * Math.PI / 180));

    let coords = [
        [center.lat - latOffset/2, center.lng - lngOffset/2],
        [center.lat - latOffset/2, center.lng + lngOffset/2],
        [center.lat + latOffset/2, center.lng + lngOffset/2],
        [center.lat + latOffset/2, center.lng - lngOffset/2]
    ];

    let polygon = L.polygon(coords);

    drawnItems.clearLayers();
    drawnItems.addLayer(polygon);

    let geojson = polygon.toGeoJSON();
    document.getElementById('geojson').value = JSON.stringify(geojson);
    document.getElementById('area').value = areaHa.toFixed(2);
}
</script>

{% endblock %}
