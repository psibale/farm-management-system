{% extends "layout.html" %}

{% block content %}
<div class="container-fluid py-3">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h4 class="mb-0">➕ Add Sub-field</h4>
            <small class="text-muted">Parent Field: <strong>{{ field_name }}</strong></small>
        </div>

        <a href="{{ url_for('gis.view_fields') }}" class="btn btn-outline-secondary btn-sm">
            ⬅ Back
        </a>
    </div>

    <div class="row g-3">

        <!-- LEFT PANEL -->
        <div class="col-lg-4">

            <!-- FORM CARD -->
            <div class="card shadow-sm border-0 mb-3">
                <div class="card-body">

                    <form method="POST" action="{{ url_for('gis.save_subfield') }}">

                        <input type="hidden" name="parent_field" value="{{ field_name }}">
                        <textarea name="geojson" id="geojson" hidden></textarea>

                        <!-- Name -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Sub-field Name</label>
                            <input type="text" name="sub_field" class="form-control"
                                   value="{{ sub_name }}" readonly>
                        </div>

                        <!-- Area -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Calculated Area (Ha)</label>
                            <input type="number" step="0.01" name="area" id="area"
                                   class="form-control bg-light" readonly>
                        </div>

                        <!-- Manual Area -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Manual Area (Ha)</label>
                            <input type="number" step="0.01" id="manual_area"
                                   class="form-control"
                                   placeholder="e.g. 5">
                        </div>

                        <!-- ACTION BUTTONS -->
                        <div class="d-grid gap-2">
                            <button type="button"
                                    class="btn btn-primary"
                                    onclick="generatePolygon()">
                                ⚡ Generate from Area
                            </button>

                            <button class="btn btn-success">
                                💾 Save Sub-field
                            </button>
                        </div>

                    </form>

                </div>
            </div>

            <!-- AUTO SPLIT CARD -->
            <div class="card shadow-sm border-0">
                <div class="card-body">

                    <h6 class="fw-bold mb-2">⚡ Auto Split</h6>
                    <small class="text-muted d-block mb-3">
                        Automatically divide field into equal parts
                    </small>

                    <form method="POST"
                          action="{{ url_for('gis.auto_split_field') }}">

                        <input type="hidden" name="field" value="{{ field_name }}">

                        <div class="input-group">
                            <input type="number"
                                   name="parts"
                                   placeholder="No. parts"
                                   min="2"
                                   required
                                   class="form-control">

                            <button type="submit" class="btn btn-info">
                                Split
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>

        <!-- RIGHT PANEL (MAP) -->
        <div class="col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-2">
                    <div id="map" style="height: 75vh; border-radius: 12px;"></div>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>
<script src="https://unpkg.com/leaflet-geometryutil"></script>

<script>
var map = L.map('map').setView([-13.98, 33.77], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

var drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

// Parent field
var parentGeo = JSON.parse('{{ parent_geojson | safe }}');

var parentLayer = L.geoJSON(parentGeo, {
    style: {
        color: "#000",
        weight: 3,
        fillOpacity: 0.05
    }
}).addTo(map);

map.fitBounds(parentLayer.getBounds());

// Draw controls
var drawControl = new L.Control.Draw({
    draw: {
        polygon: true,
        rectangle: true,
        circle: false,
        marker: false,
        polyline: false
    },
    edit: {
        featureGroup: drawnItems
    }
});
map.addControl(drawControl);

// Draw event
map.on(L.Draw.Event.CREATED, function (event) {
    var layer = event.layer;
    drawnItems.clearLayers();
    drawnItems.addLayer(layer);

    var geojson = layer.toGeoJSON();
    document.getElementById('geojson').value = JSON.stringify(geojson);

    var latlngs = layer.getLatLngs()[0];
    var area = L.GeometryUtil.geodesicArea(latlngs) / 10000;

    document.getElementById('area').value = area.toFixed(2);
});

// Smart generate
function generatePolygon() {
    let areaHa = parseFloat(document.getElementById("manual_area").value);

    if (!areaHa || areaHa <= 0) {
        alert("Enter a valid area");
        return;
    }

    let areaM2 = areaHa * 10000;
    let bounds = parentLayer.getBounds();

    let attempts = 0;
    let polygon = null;

    while (attempts < 50) {

        // Random center inside bounds
        let lat = bounds.getSouth() + Math.random() * (bounds.getNorth() - bounds.getSouth());
        let lng = bounds.getWest() + Math.random() * (bounds.getEast() - bounds.getWest());

        let center = L.latLng(lat, lng);

        let side = Math.sqrt(areaM2);

        let latOffset = side / 111320;
        let lngOffset = side / (111320 * Math.cos(center.lat * Math.PI / 180));

        let coords = [
            [center.lat - latOffset/2, center.lng - lngOffset/2],
            [center.lat - latOffset/2, center.lng + lngOffset/2],
            [center.lat + latOffset/2, center.lng + lngOffset/2],
            [center.lat + latOffset/2, center.lng - lngOffset/2]
        ];

        // 🔥 CHECK: all points inside parent polygon
        let inside = true;

        coords.forEach(c => {
            if (!pointInPolygon(c, parentGeo.geometry.coordinates[0])) {
                inside = false;
            }
        });

        if (inside) {
            polygon = L.polygon(coords);
            break;
        }

        attempts++;
    }

    if (!polygon) {
        alert("❌ Could not fit this area inside the field.\nTry smaller area.");
        return;
    }

    drawnItems.clearLayers();
    drawnItems.addLayer(polygon);

    let geojson = polygon.toGeoJSON();
    document.getElementById('geojson').value = JSON.stringify(geojson);
    document.getElementById('area').value = areaHa.toFixed(2);
}

function pointInPolygon(point, vs) {
    let x = point[1], y = point[0];

    let inside = false;
    for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
        let xi = vs[i][0], yi = vs[i][1];
        let xj = vs[j][0], yj = vs[j][1];

        let intersect = ((yi > y) !== (yj > y))
            && (x < (xj - xi) * (y - yi) / (yj - yi + 0.00000001) + xi);

        if (intersect) inside = !inside;
    }

    return inside;
}
</script>

{% endblock %}
