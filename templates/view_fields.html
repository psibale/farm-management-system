<!DOCTYPE html>
<html>
<head>
    <title>Saved Fields</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
    <style>
        #map {
            height: 400px;
            margin-bottom: 20px;
        }
        .field-card {
            margin-bottom: 30px;
        }
        .action-buttons {
            margin-top: 15px;
        }
    </style>
</head>
<body class="p-4">
    <div class="container">
        <h2 class="mb-4">📄 Saved Fields</h2>

        {% for field in fields %}
        <div class="card field-card">
            <div class="card-body">
                <h5 class="card-title">Field: {{ field['Field Name'] }}</h5>
                <p>
                    <strong>Crop:</strong> {{ field['Crop'] }} |
                    <strong>Soil:</strong> {{ field['Soil'] }} |
                    <strong>Area:</strong> {{ field['Area (Ha)'] }} Ha
                </p>
                <div id="map{{ loop.index }}"></div>

                <div class="action-buttons">
                    <a href="{{ url_for('gis.edit_polygon', field_name=field['Field Name']) }}" class="btn btn-warning btn-sm">✏️ Edit</a>
                    <form method="POST" action="{{ url_for('gis.delete_polygon') }}" style="display:inline;">
                        <input type="hidden" name="field_name" value="{{ field['Field Name'] }}">
                        <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure you want to delete this field?');">🗑️ Delete</button>
                    </form>
                </div>
            </div>
        </div>
        <script>
            const geojson{{ loop.index }} = {{ field['GeoJSON'] | safe }};
            const map{{ loop.index }} = L.map('map{{ loop.index }}').setView([0, 0], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 18
            }).addTo(map{{ loop.index }});
            const layer{{ loop.index }} = L.geoJSON(geojson{{ loop.index }}).addTo(map{{ loop.index }});
            map{{ loop.index }}.fitBounds(layer{{ loop.index }}.getBounds());
        </script>
        {% endfor %}

        <a href="{{ url_for('gis_home') }}" class="btn btn-secondary mt-4">⬅️ Back to GIS Hub</a>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
</body>
</html>
