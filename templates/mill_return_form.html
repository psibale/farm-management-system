<!-- mill_return_form.html -->
{% extends 'layout.html' %}
{% block content %}
<div class="container py-4">
    <h3 class="mb-4">🚛 Daily Mill Return Entry</h3>
    {% if session['role'] in ['Manager','Mill & Safety', 'Admin'] %}
    <form method="post">
        <div class="mb-3">
            <label for="Date" class="form-label">Date</label>
            <input type="date" name="Date" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="Field" class="form-label">Field</label>
            <input type="text" name="Field" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="Variety" class="form-label">Variety</label>
            <input type="text" name="Variety" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="Bundles" class="form-label">Bundles</label>
            <input type="number" name="Bundles" class="form-control" required min="1">
        </div>
        <div class="mb-3">
            <label for="Tons Delivered" class="form-label">Tons Delivered</label>
            <input type="number" step="0.01" name="Tons Delivered" class="form-control" required min="0">
        </div>
        <button type="submit" class="btn btn-primary">💾 Save Record</button>
    </form>
     {% endif %}
    <hr>
    <div class="d-flex flex-wrap gap-2 mt-3">
        <a href="{{ request.path }}/view" class="btn btn-info">📂 View All Records</a>
        <a href="{{ request.path }}/summary" class="btn btn-secondary">📊 Monthly Summary</a>
        <a href="{{ url_for('mill.mill_return_tonnage_graph') }}" class="btn btn-primary">📈 View Tonnage Graph</a>



        <a href="{{ url_for('dsc.dsc_dashboard') }}" class="btn btn-outline-dark">⬅️ Back to DSC Dashboard</a>
    </div>
</div>
{% endblock %}
