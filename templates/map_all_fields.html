<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>🌍 Field Stress Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body {
            margin: 0;
            background: #f6f9fb;
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        .sidebar {
            height: 100vh;
            overflow-y: auto;
            background: #ffffff;
            border-right: 1px solid #dee2e6;
            padding: 15px;
        }

        .map-container {
            height: 100vh;
            padding: 10px;
        }

        #map {
            height: 100%;
            border-radius: 14px;
        }

        .field-item {
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 6px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .field-item:hover {
            background: #f1f5f9;
        }

        .stress-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .legend {
            background: white;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.85rem;
            box-shadow: 0 6px 18px rgba(0,0,0,0.15);
        }

        .legend i {
            width: 14px;
            height: 14px;
            display: inline-block;
            margin-right: 6px;
            border-radius: 3px;
        }

        /* 🔥 Floating Back Button */
        .back-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            z-index: 999;
        }
    </style>
</head>

<body>

<!-- 🔥 Floating Back Button -->
<a href="{{ url_for('gis_home') }}" class="btn btn-dark back-btn">
    ⬅ Back
</a>

<div class="container-fluid">
    <div class="row g-0">

        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 sidebar">
            <h5 class="fw-bold mb-3">📋 Fields</h5>

            <input type="text" id="fieldSearch"
                   class="form-control form-control-sm mb-3"
                   placeholder="Search field...">

            <div id="fieldList"></div>
        </div>

        <!-- Map -->
        <div class="col-md-9 col-lg-10 map-container">
            <div id="map"></div>
        </div>

    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    const fields = {{ fields | tojson | safe }} || [];
    const subFields = {{ sub_fields | tojson | safe }} || [];

    const fieldLayers = {};
    const subFieldLayers = {};
    const fieldListDiv = document.getElementById("fieldList");

    let activeSidebarItem = null;
    let activeSubLayers = [];

    const map = L.map('map').setView([-12.5, 34.1], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    function getColor(stress) {
        switch (stress) {
            case 'Low': return '#28a745';
            case 'Moderate': return '#ffc107';
            case 'High': return '#fd7e14';
            case 'Critical': return '#dc3545';
            default: return '#6c757d';
        }
    }

    let allLayers = [];

    // ============================
    // MAIN FIELDS
    // ============================
    fields.forEach(field => {

        const layer = L.geoJSON(field.geojson, {
            style: {
                color: getColor(field.stress),
                weight: 2,
                fillOpacity: 0.55
            }
        }).addTo(map);

        layer.bindPopup(`
            <strong>${field.name}</strong><br>
            🌱 Crop: ${field.crop}<br>
            🌍 Soil: ${field.soil}<br>
            📏 Area: ${field.area} ha<br>
            ⚠️ Stress: <b style="color:${getColor(field.stress)}">${field.stress}</b>
        `);

        fieldLayers[field.name] = layer;
        allLayers.push(layer);

        const li = document.createElement("div");
        li.className = "field-item";
        li.dataset.name = field.name;

        li.innerHTML = `
            <span>${field.name}</span>
            <span class="stress-dot" style="background:${getColor(field.stress)}"></span>
        `;

        li.onclick = () => toggleSubFields(field.name, layer);
        fieldListDiv.appendChild(li);
    });

    // ============================
    // SUB-FIELDS (HIDDEN INITIALLY)
    // ============================
    subFields.forEach(sf => {

        if (!sf || !sf.geojson) return;

        let geo = sf.geojson;
        if (typeof geo === "string") geo = JSON.parse(geo);

        const layer = L.geoJSON(geo, {
            style: {
                color: "#007bff",
                weight: 2,
                fillOpacity: 0.25,
                dashArray: "5,5"
            }
        });

        layer.bindPopup(`
            <strong>Sub-field</strong><br>
            🌱 Name: ${sf.name}<br>
            📏 Area: ${sf.area} ha<br>
            🏷 Parent: ${sf.parent}
        `);

        subFieldLayers[sf.name] = {
            layer: layer,
            parent: sf.parent
        };
    });

    // ============================
    // TOGGLE SUB-FIELDS
    // ============================
    function toggleSubFields(fieldName, layer) {

        // Clear existing sub-fields
        activeSubLayers.forEach(l => map.removeLayer(l));
        activeSubLayers = [];

        // If already active → just zoom
        if (activeSidebarItem && activeSidebarItem.dataset.name === fieldName) {
            zoomToLayer(layer, fieldName);
            return;
        }

        // Add matching sub-fields
        Object.values(subFieldLayers).forEach(sf => {
            if (sf.parent === fieldName) {
                sf.layer.addTo(map);
                activeSubLayers.push(sf.layer);
            }
        });

        zoomToLayer(layer, fieldName);
    }

    // ============================
    // FIT MAP
    // ============================
    if (allLayers.length > 0) {
        const group = L.featureGroup(allLayers);
        map.fitBounds(group.getBounds(), { padding: [40, 40] });
    }

    // ============================
    // ZOOM FUNCTION
    // ============================
    function zoomToLayer(layer, name) {
        map.fitBounds(layer.getBounds(), { padding: [40, 40] });
        layer.openPopup();
        highlight(name);
    }

    function highlight(name) {
        if (activeSidebarItem) activeSidebarItem.style.background = "";

        const item = document.querySelector(`.field-item[data-name='${name}']`);
        if (item) {
            item.style.background = "#e2f0ff";
            activeSidebarItem = item;
        }
    }

    // ============================
    // SEARCH
    // ============================
    document.getElementById("fieldSearch").addEventListener("keyup", function () {
        const filter = this.value.toLowerCase();

        document.querySelectorAll(".field-item").forEach(item => {
            const name = item.dataset.name.toLowerCase();
            item.style.display = name.includes(filter) ? "" : "none";
        });
    });

    // ============================
    // LEGEND
    // ============================
    const legend = L.control({ position: "bottomright" });

    legend.onAdd = function () {
        const div = L.DomUtil.create("div", "legend");
        div.innerHTML = `
            <strong>Stress Levels</strong><br>
            <i style="background:#28a745"></i> Low<br>
            <i style="background:#ffc107"></i> Moderate<br>
            <i style="background:#fd7e14"></i> High<br>
            <i style="background:#dc3545"></i> Critical<br>
            <i style="background:#007bff"></i> Sub-field
        `;
        return div;
    };

    legend.addTo(map);
</script>

</body>
</html>
