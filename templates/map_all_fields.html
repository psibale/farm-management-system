<!DOCTYPE html>
<html>
<head>
    <title>🌍 Field Map with Stress Levels</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map { height: 90vh; width: 100%; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h3>🗺️ Field Map (Stress Level Overlay)</h3>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const fields = {{ fields | tojson }};

        const map = L.map('map').setView([-12.5, 34.1], 13);  // adjust center/zoom

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        function getColor(stress) {
            switch (stress) {
                case 'Low': return '#28a745';       // green
                case 'Moderate': return '#ffc107';  // yellow
                case 'High': return '#fd7e14';      // orange
                case 'Critical': return '#dc3545';  // red
                default: return '#6c757d';          // gray
            }
        }

        fields.forEach(field => {
            const geojson = L.geoJSON(field.geojson, {
                style: {
                    color: getColor(field.stress),
                    weight: 2,
                    fillOpacity: 0.5
                }
            }).addTo(map);

            geojson.bindPopup(`
                <strong>Field:</strong> ${field.name}<br>
                <strong>Crop:</strong> ${field.crop}<br>
                <strong>Soil:</strong> ${field.soil}<br>
                <strong>Area:</strong> ${field.area} Ha<br>
                <strong>Stress Level:</strong> <span style="color:${getColor(field.stress)}">${field.stress}</span>
            `);
        });
    </script>
</body>
</html>
