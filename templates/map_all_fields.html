<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>🌍 Field Stress Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body {
            margin: 0;
            background: #f6f9fb;
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        .sidebar {
            height: 100vh;
            overflow-y: auto;
            background: #ffffff;
            border-right: 1px solid #dee2e6;
            padding: 15px;
        }

        .map-container {
            height: 100vh;
            padding: 10px;
        }

        #map {
            height: 100%;
            border-radius: 14px;
        }

        .field-item {
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 6px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .field-item:hover {
            background: #f1f5f9;
            transform: translateX(3px);
        }

        .stress-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .legend {
            background: white;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.85rem;
            box-shadow: 0 6px 18px rgba(0,0,0,0.15);
        }

        .legend i {
            width: 14px;
            height: 14px;
            display: inline-block;
            margin-right: 6px;
            border-radius: 3px;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row g-0">

        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 sidebar">
            <h5 class="fw-bold mb-3">📋 Fields</h5>

            <input type="text" id="fieldSearch"
                   class="form-control form-control-sm mb-3"
                   placeholder="Search field...">

            <div id="fieldList"></div>
        </div>

        <!-- Map -->
        <div class="col-md-9 col-lg-10 map-container">
            <div id="map"></div>
        </div>

    </div>
</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    const fields = {{ fields | tojson | safe }} || [];

    const fieldLayers = {};
    const fieldListDiv = document.getElementById("fieldList");
    let activeSidebarItem = null;

    const map = L.map('map').setView([-12.5, 34.1], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    function getColor(stress) {
        switch (stress) {
            case 'Low': return '#28a745';
            case 'Moderate': return '#ffc107';
            case 'High': return '#fd7e14';
            case 'Critical': return '#dc3545';
            default: return '#6c757d';
        }
    }

    let allLayers = [];

    // ============================
    // LOAD FIELDS
    // ============================
    fields.forEach(field => {

        const layer = L.geoJSON(field.geojson, {
            style: {
                color: getColor(field.stress),
                weight: 2,
                fillOpacity: 0.55
            }
        }).addTo(map);

        // 🔥 Better popup
        layer.bindPopup(`
            <div style="min-width:180px;">
                <strong>${field.name}</strong><br>
                🌱 Crop: ${field.crop}<br>
                🌍 Soil: ${field.soil}<br>
                📏 Area: ${field.area} ha<br>
                ⚠️ Stress:
                <span style="color:${getColor(field.stress)}; font-weight:600;">
                    ${field.stress}
                </span>
            </div>
        `);

        // Hover highlight
        layer.on('mouseover', () => {
            layer.setStyle({ weight: 4, fillOpacity: 0.75 });
        });

        layer.on('mouseout', () => {
            layer.setStyle({ weight: 2, fillOpacity: 0.55 });
        });

        layer.on('click', () => {
            highlightSidebarItem(field.name);
        });

        fieldLayers[field.name] = layer;
        allLayers.push(layer);

        // Sidebar item
        const li = document.createElement("div");
        li.className = "field-item";
        li.dataset.name = field.name;

        li.innerHTML = `
            <span>${field.name}</span>
            <span class="stress-dot" style="background:${getColor(field.stress)}"></span>
        `;

        li.onclick = () => zoomToField(field.name);

        fieldListDiv.appendChild(li);
    });

    // ============================
    // AUTO FIT ALL FIELDS
    // ============================
    if (allLayers.length > 0) {
        const group = L.featureGroup(allLayers);
        map.fitBounds(group.getBounds(), { padding: [40, 40] });
    }

    // ============================
    // ZOOM FUNCTION
    // ============================
    function zoomToField(fieldName) {
        const layer = fieldLayers[fieldName];
        if (!layer) return;

        map.fitBounds(layer.getBounds(), { padding: [40, 40] });

        layer.setStyle({ weight: 5, fillOpacity: 0.85 });
        layer.openPopup();

        highlightSidebarItem(fieldName);

        setTimeout(() => {
            layer.setStyle({ weight: 2, fillOpacity: 0.55 });
        }, 2000);
    }

    // ============================
    // SIDEBAR HIGHLIGHT
    // ============================
    function highlightSidebarItem(fieldName) {
        if (activeSidebarItem) {
            activeSidebarItem.style.background = "";
        }

        const item = document.querySelector(`.field-item[data-name='${fieldName}']`);

        if (item) {
            item.style.background = "#e2f0ff";
            item.scrollIntoView({ behavior: "smooth", block: "center" });
            activeSidebarItem = item;
        }
    }

    // ============================
    // SEARCH FILTER
    // ============================
    document.getElementById("fieldSearch").addEventListener("keyup", function () {
        const filter = this.value.toLowerCase();

        document.querySelectorAll(".field-item").forEach(item => {
            const name = item.dataset.name.toLowerCase();
            item.style.display = name.includes(filter) ? "" : "none";
        });
    });

    // ============================
    // LEGEND
    // ============================
    const legend = L.control({ position: "bottomright" });

    legend.onAdd = function () {
        const div = L.DomUtil.create("div", "legend");
        div.innerHTML = `
            <strong>Stress Levels</strong><br>
            <i style="background:#28a745"></i> Low<br>
            <i style="background:#ffc107"></i> Moderate<br>
            <i style="background:#fd7e14"></i> High<br>
            <i style="background:#dc3545"></i> Critical
        `;
        return div;
    };

    legend.addTo(map);
</script>

</body>
</html>
