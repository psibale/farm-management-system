<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="utf-8">

<title>
🌍 DCGL GIS Field Map
</title>

<meta name="viewport" content="width=device-width, initial-scale=1">


<link rel="stylesheet"
href="{{ url_for('static', filename='css/bootstrap.min.css') }}">


<link rel="stylesheet"
href="{{ url_for('static', filename='css/leaflet.css') }}">


<style>

body{

    margin:0;

    background:#f6f9fb;

    font-family:"Segoe UI",system-ui,sans-serif;

}



/* ===================================
SIDEBAR
=================================== */

.sidebar{

    height:100vh;

    overflow-y:auto;

    background:#ffffff;

    border-right:1px solid #dee2e6;

    padding:18px;

    box-shadow:3px 0 12px rgba(0,0,0,.05);

}



.sidebar-header{

    border-bottom:1px solid #dee2e6;

    margin-bottom:15px;

    padding-bottom:10px;

}



.sidebar-header h5{

    margin-bottom:3px;

    font-weight:700;

}



.sidebar-header small{

    color:#6c757d;

}



/* ===================================
SEARCH BOX
=================================== */

#fieldSearch{

    border-radius:8px;

}



/* ===================================
BUTTONS
=================================== */

#stressMode,
#qualityMode,
#hideSubFields{

    border-radius:8px;

}



/* ===================================
FIELD TREE
=================================== */

.field-tree{

    margin-top:10px;

}



.field-item{

    padding:8px 10px;

    border-radius:8px;

    margin-bottom:5px;

    cursor:pointer;

    transition:.25s;

}



.field-item:hover{

    background:#eef5ff;

}



.parent-field{

    display:flex;

    justify-content:space-between;

    align-items:center;

    font-weight:600;

}



.toggle{

    color:#198754;

    font-weight:bold;

    cursor:pointer;

    margin-right:6px;

}



.sub-list{

    margin-left:22px;

    margin-top:6px;

}



.sub-field-item{

    padding:6px 10px;

    border-radius:6px;

    cursor:pointer;

    color:#495057;

    transition:.2s;

}



.sub-field-item:hover{

    background:#dbeeff;

}



/* ===================================
FIELD STATUS DOT
=================================== */

.stress-dot{

    width:12px;

    height:12px;

    border-radius:50%;

}



/* ===================================
MAP
=================================== */

.map-container{

    height:100vh;

    padding:10px;

}



#map{

    height:100%;

    border-radius:15px;

    box-shadow:0 5px 18px rgba(0,0,0,.08);

}



/* ===================================
LEGEND
=================================== */

.legend{

    background:white;

    padding:12px;

    border-radius:10px;

    font-size:.85rem;

    box-shadow:0 6px 18px rgba(0,0,0,.15);

}



.legend i{

    width:14px;

    height:14px;

    display:inline-block;

    margin-right:6px;

    border-radius:3px;

}



/* ===================================
BACK BUTTON
=================================== */

.back-btn{

    position:absolute;

    top:15px;

    right:20px;

    z-index:999;

}



/* ===================================
ACTIVE FIELD
=================================== */

.active-field{

    background:#d7ebff !important;

    border-left:5px solid #0d6efd;

}



/* ===================================
SCROLLBAR
=================================== */

.sidebar::-webkit-scrollbar{

    width:8px;

}



.sidebar::-webkit-scrollbar-thumb{

    background:#c8d0d8;

    border-radius:20px;

}



.sidebar::-webkit-scrollbar-thumb:hover{

    background:#adb5bd;

}

</style>


</head>



<body>

<!-- 🔥 Floating Back Button -->
<a href="{{ url_for('gis_home') }}" class="btn btn-dark back-btn">
    ⬅ Back
</a>

<div class="container-fluid">


<div class="row g-0">


<!-- =========================
SIDEBAR
========================= -->

<div class="col-md-3 col-lg-2 sidebar">

    <div class="sidebar-header mb-3">

        <h5 class="fw-bold mb-1">

            🌾 Farm Fields

        </h5>

        <small class="text-muted">

            Select a field to view its details

        </small>

    </div>

    <!-- Search -->

    <input
        type="text"
        id="fieldSearch"
        class="form-control form-control-sm mb-3"
        placeholder="🔍 Search field...">

    <!-- Map Modes -->

    <div class="d-grid gap-2 mb-3">

        <button
            id="stressMode"
            class="btn btn-success btn-sm">

            🌱 Stress View

        </button>

        <button
            id="qualityMode"
            class="btn btn-warning btn-sm">

            🗺 GIS Quality

        </button>

        <button
            id="hideSubFields"
            class="btn btn-outline-secondary btn-sm">

            👁 Hide Sub-fields

        </button>

    </div>

    <hr>

    <!-- Sidebar Tree -->

    <div
        id="fieldList"
        class="field-tree">

    </div>

</div>


<!-- MAP -->

<div class="col-md-9 col-lg-10 map-container">


<div id="map"></div>


</div>



</div>


</div>




<script src="{{ url_for('static', filename='js/leaflet.js') }}"></script>




<script>

const fields =
{{ fields | tojson | safe }} || [];
console.log(fields);
console.log(fields.length);

const subFields =
{{ sub_fields | tojson | safe }} || [];

const selectedField =
    "{{ selected_field or '' }}";

const qualityData =
{{ quality | tojson | safe }} || {};



const fieldLayers = {};

const subFieldLayers = {};

const fieldListDiv =
document.getElementById("fieldList");



let activeSidebarItem=null;

let activeSubLayers=[];

function showSubFields(parentField){

    // Remove previously displayed sub-fields
    activeSubLayers.forEach(layer => {
        map.removeLayer(layer);
    });

    activeSubLayers = [];

    // Add only the selected field's sub-fields
    Object.values(subFieldLayers).forEach(sf => {

        if(sf.parent === parentField){

            sf.layer.addTo(map);

            activeSubLayers.push(sf.layer);

        }

    });

}

let mapMode="stress";




const map=L.map('map')
.setView([-12.5,34.1],13);



L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{

attribution:'&copy; OpenStreetMap'

}

).addTo(map);





function getStressColor(stress){


switch(stress){


case "Low":
return "#28a745";


case "Moderate":
return "#ffc107";


case "High":
return "#fd7e14";


case "Critical":
return "#dc3545";


default:
return "#6c757d";


}


}






function getQualityColor(name){


let q =
qualityData[name];


if(!q)

return "#6c757d";



if(q.quality>=100)

return "#198754";



if(q.quality>=90)

return "#ffc107";


return "#dc3545";


}







function getFieldColor(field){


if(mapMode==="quality")

return getQualityColor(field.name);



return getStressColor(field.stress);


}







let allLayers=[];



//----------------------------------------------------
// DRAW MAIN FIELD POLYGONS
//----------------------------------------------------

fields.forEach(field => {

    const layer = L.geoJSON(field.geojson, {

        style: {

            color: getFieldColor(field),

            fillColor: getFieldColor(field),

            weight: 2,

            fillOpacity: 0.55

        }

    }).addTo(map);

    const q = qualityData[field.name];

    layer.bindPopup(`

        <strong>${field.name}</strong><br><br>

        🌱 Crop: ${field.crop}<br>

        🌍 Soil: ${field.soil}<br>

        📏 Area: ${field.area} ha<br><br>

        ⚠️ Stress:
        <b>${field.stress}</b><br>

        🗺️ GIS Quality:
        <b>${q ? q.quality + "%" : "N/A"}</b><br>

        📌 Status:
        ${q ? q.status : "Unknown"}

        ${q && q.warnings.length
            ? "<br><br>⚠️ " + q.warnings.join("<br>")
            : ""
        }

    `);

    layer.on("click", function () {

        highlight(field.name);

        showSubFields(field.name);

    });

    fieldLayers[field.name] = layer;

    allLayers.push(layer);

});


//----------------------------------------------------
// BUILD SIDEBAR TREE
//----------------------------------------------------

fields.forEach(field => {

    const wrapper = document.createElement("div");

    wrapper.className = "field-item";

    wrapper.dataset.name = field.name;

    //------------------------------------------------

    const parent = document.createElement("div");

    parent.className = "parent-field";

    //------------------------------------------------

    const toggle = document.createElement("span");

    toggle.className = "toggle";

    toggle.innerHTML = "▶";

    //------------------------------------------------

    const label = document.createElement("span");

    label.innerHTML = field.name;

    label.style.flex = "1";

    label.style.marginLeft = "8px";

    //------------------------------------------------

    const dot = document.createElement("span");

    dot.className = "stress-dot";

    dot.style.background = getFieldColor(field);

    //------------------------------------------------

    parent.appendChild(toggle);

    parent.appendChild(label);

    parent.appendChild(dot);

    wrapper.appendChild(parent);

    //------------------------------------------------
    // SUB-FIELDS
    //------------------------------------------------

    const subList = document.createElement("div");

    subList.className = "sub-list";

    subList.style.display = "none";

    subFields
        .filter(sf => sf.parent === field.name)
        .forEach(sf => {

            const child = document.createElement("div");

            child.className = "sub-field-item";

            child.innerHTML = "└ " + sf.name;

            child.onclick = function (e) {

                e.stopPropagation();

                showSubFields(field.name);

                const sub = subFieldLayers[sf.name];

                if(sub){

                    map.fitBounds(sub.layer.getBounds());

                    sub.layer.openPopup();

                }

            };

            subList.appendChild(child);

        });

    wrapper.appendChild(subList);

    //------------------------------------------------
    // CLICK MAIN FIELD
    //------------------------------------------------

    parent.onclick = function () {

        const layer = fieldLayers[field.name];

        map.fitBounds(layer.getBounds());

        layer.openPopup();

        highlight(field.name);

        layer.bringToFront();

        showSubFields(field.name);

        if(subList.style.display === "none"){

            subList.style.display = "block";

            toggle.innerHTML = "▼";

        }

        else{

            subList.style.display = "none";

            toggle.innerHTML = "▶";

        }

    };

    fieldListDiv.appendChild(wrapper);

});


//----------------------------------------------------
// LOAD SUB FIELD POLYGONS
//----------------------------------------------------

subFields.forEach(sf => {

    if(!sf.geojson) return;

    let geo = sf.geojson;

    if(typeof geo === "string"){

        geo = JSON.parse(geo);

    }

    const layer = L.geoJSON(geo,{

        style:{

            color:"#007bff",

            weight:2,

            fillOpacity:0.25,

            dashArray:"5,5"

        }

    });

    layer.bindPopup(`

        <strong>Sub-field</strong><br>

        ${sf.name}<br>

        Area: ${sf.area} ha

    `);

    subFieldLayers[sf.name] = {

        layer: layer,

        parent: sf.parent

    };

});


//----------------------------------------------------
// HIGHLIGHT ACTIVE FIELD
//----------------------------------------------------

function highlight(name){

    if(activeSidebarItem){

        activeSidebarItem.classList.remove("active-field");

    }

    let item = document.querySelector(

        `.field-item[data-name='${name}']`

    );

    if(item){

        item.classList.add("active-field");

        activeSidebarItem = item;

    }

}



function refreshColors(){



fields.forEach(field=>{


let layer =
fieldLayers[field.name];



layer.setStyle({

color:getFieldColor(field),

fillColor:getFieldColor(field)

});



});



document.querySelectorAll(".field-item")
.forEach(item=>{


let field=
fields.find(
f=>f.name===item.dataset.name
);


item.querySelector(".stress-dot")
.style.background=
getFieldColor(field);


});


}





document.getElementById("stressMode")
.onclick=function(){

mapMode="stress";

refreshColors();

};



document.getElementById("qualityMode")
.onclick=function(){

mapMode="quality";

refreshColors();

};







document.getElementById("fieldSearch")
.onkeyup=function(){


let value=this.value.toLowerCase();



document.querySelectorAll(".field-item")
.forEach(item=>{


item.style.display =
item.dataset.name
.toLowerCase()
.includes(value)
?
""
:
"none";


});


};







if(allLayers.length){

map.fitBounds(
L.featureGroup(allLayers)
.getBounds()
);


}


// =================================
// OPEN SELECTED FIELD FROM DASHBOARD
// =================================

if (selectedField) {

    setTimeout(() => {

        const layer = fieldLayers[selectedField];

        if (layer) {

            // Zoom to the selected field
            map.fitBounds(layer.getBounds());

            // Open its popup
            layer.openPopup();

            // Highlight the sidebar item
            highlight(selectedField);

            // Display its sub-fields
            showSubFields(selectedField);

            // Highlight the selected polygon
            layer.setStyle({

                color: "#ff0000",
                weight: 5,
                fillOpacity: 0.65

            });

        }

    }, 500);

}



document.getElementById("hideSubFields").onclick = function () {

    activeSubLayers.forEach(layer => {

        map.removeLayer(layer);

    });

    activeSubLayers = [];

};

// LEGEND


let legend=L.control({

position:"bottomright"

});



legend.onAdd=function(){


let div=L.DomUtil.create(
"div",
"legend"
);



div.innerHTML=`

<strong>
🌍 Map Legend
</strong>

<br><br>


<b>
Stress
</b>

<br>

<i style="background:#28a745"></i>
Low

<br>

<i style="background:#ffc107"></i>
Moderate

<br>

<i style="background:#fd7e14"></i>
High

<br>

<i style="background:#dc3545"></i>
Critical


<hr>


<b>
GIS Quality
</b>

<br>

<i style="background:#198754"></i>
OK

<br>

<i style="background:#ffc107"></i>
Review

<br>

<i style="background:#dc3545"></i>
Invalid


`;



return div;


};



legend.addTo(map);



</script>



</body>

</html>
