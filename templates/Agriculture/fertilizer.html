<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fertilizer Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        .container-flex {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        #sidebar {
            width: 300px;
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            overflow-y: auto;
        }
        #sidebar h4, #sidebar h6, #sidebar label {
            color: #ecf0f1;
        }
        #main {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .form-section {
            margin-bottom: 40px;
        }
        .form-label {
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container-flex">
    <!-- Sidebar -->
    <div id="sidebar">
        <h4>Fertilizer Management</h4>
        <a href="{{ url_for('activities.fertilizer') }}" class="btn btn-outline-light w-100 my-2">🧪 Fertilizer Entry</a>
        <a href="{{ url_for('activities.fertilizer_report') }}" class="btn btn-outline-light w-100 my-2">📊 Fertilizer Report</a>
        <a href="{{ url_for('activities.farm_activities') }}" class="btn btn-outline-light w-100 my-2">← Back to Activities</a>
    </div>

    <!-- Main Content -->
    <div id="main">
        <h2>Fertilizer Application Form</h2>

        {% if session['role'] in ['Manager','Data Clerk', 'Admin'] %}
        <form method="POST">
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Date</label>
                    <input type="date" name="Date" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Field</label>
                    <input type="text" name="Field" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Area (Ha)</label>
                    <input type="text" name="Area (Ha)" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Crop</label>
                    <input type="text" name="Crop" class="form-control">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <h5>Basal Dressing</h5>
                    <label class="form-label">DAP (Bags)</label>
                    <input type="number" name="DAP" class="form-control" step="1">
                    <label class="form-label">SA (Bags)</label>
                    <input type="number" name="SA" class="form-control" step="1">
                    <label class="form-label">MOP (Bags)</label>
                    <input type="number" name="MOP_Basal" class="form-control" step="1">
                    <label class="form-label">Zinc (Bags)</label>
                    <input type="number" name="Zinc" class="form-control" step="1">
                </div>

                <div class="col-md-6">
                    <h5>Top Dressing</h5>
                    <label class="form-label">UREA (Bags)</label>
                    <input type="number" name="UREA" class="form-control" step="1">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Mandays</label>
                <input type="number" name="Mandays" class="form-control" step="1">
            </div>

            <input type="hidden" name="Season" value="{{ season }}">
            <button type="submit" class="btn btn-success">Save Entry</button>
        </form>
        {% endif %}
    </div>
</div>
</body>
</html>
