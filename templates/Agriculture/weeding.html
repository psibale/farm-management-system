<!-- templates/agriculture/weeding.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weeding Activity</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5">
    <h2 class="mb-4">🌿 Weeding Activity - Season: {{ season }}</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="row mb-3">
            <div class="col-md-6">
                <label>Date</label>
                <input type="date" name="Date" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label>Field</label>
                <input type="text" name="Field" class="form-control" required>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label>Method Used</label>
                <input type="text" name="Method Used" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label>Weeded Area (ha)</label>
                <input type="number" step="0.01" name="Weeded Area (ha)" class="form-control" required>
            </div>
        </div>

        <div class="mb-3">
            <label>Mandays</label>
            <input type="number" name="Mandays" class="form-control">
        </div>

        <input type="hidden" name="Season" value="{{ season }}">

        <button type="submit" class="btn btn-success">Save</button>
        <a href="{{ url_for('farm_activities.farm_activities') }}" class="btn btn-secondary">Back</a>
    </form>
</div>
</body>
</html>
