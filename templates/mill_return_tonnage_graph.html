{% extends "layout.html" %}

{% block content %}
<div class="container mt-4">

    <!-- 🔷 HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold mb-1">🚛 Mill Return</h3>
            <p class="text-muted mb-0">Seasonal Tonnage Analysis</p>
        </div>

        <!-- Season Badge -->
        <div class="text-end">
            <small class="text-muted d-block">Active Season</small>
            <span class="badge bg-primary fs-6 px-3 py-2 shadow-sm">
                {{ selected_season }}
            </span>
        </div>
    </div>

    <!-- 🔷 CHART CARD -->
    <div class="card border-0 shadow-lg rounded-4">
        <div class="card-body p-4">

            {% if chart_data %}
                <canvas id="tonnageChart" height="110"></canvas>
            {% else %}
                <div class="text-center py-5">
                    <h5 class="text-muted">No tonnage data available for this season</h5>
                    <p class="text-muted mb-0">Data will appear here once records are added.</p>
                </div>
            {% endif %}

        </div>
    </div>

</div>

<!-- 🔷 CHART SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
{% if chart_data %}
const ctx = document.getElementById("tonnageChart");

new Chart(ctx, {
    type: "bar",
    data: {
        labels: {{ chart_data.labels | tojson }},
        datasets: [
            {
                label: "Monthly Tons",
                data: {{ chart_data.monthly | tojson }},
                yAxisID: "y",
                borderRadius: 6
            },
            {
                label: "Cumulative Tons",
                data: {{ chart_data.cumulative | tojson }},
                type: "line",
                yAxisID: "y1",
                tension: 0.35,
                borderWidth: 3,
                pointRadius: 4
            }
        ]
    },
    options: {
        responsive: true,
        interaction: {
            mode: "index",
            intersect: false
        },
        plugins: {
            legend: {
                position: "top",
                labels: {
                    usePointStyle: true
                }
            },
            tooltip: {
                backgroundColor: "#1f2937",
                padding: 10,
                cornerRadius: 6
            }
        },
        scales: {
            y: {
                beginAtZero: true,
                title: {
                    display: true,
                    text: "Monthly Tons"
                }
            },
            y1: {
                beginAtZero: true,
                position: "right",
                grid: { drawOnChartArea: false },
                title: {
                    display: true,
                    text: "Cumulative Tons"
                }
            }
        }
    }
});
{% endif %}
</script>

{% endblock %}
