{% extends "layout.html" %}

{% block content %}
<div class="container mt-4">

    <h3 class="fw-bold mb-3">🚛 Mill Return – Seasonal Tonnage Analysis</h3>

    <!-- 🔽 SEASON SELECTOR -->
    <form method="get" class="mb-3">
    <label class="form-label">Season (Year)</label>
    <select name="year" class="form-select" onchange="this.form.submit()">
        <option value="">All Years</option>
        {% for y in range(2022, current_year + 1) %}
            <option value="{{ y }}" {% if selected_year == y %}selected{% endif %}>
                {{ y }}
            </option>
        {% endfor %}
    </select>
</form>


    <div class="card shadow-sm p-4">
        <canvas id="tonnageChart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
{% if chart_data %}
const ctx = document.getElementById("tonnageChart");

new Chart(ctx, {
    type: "bar",
    data: {
        labels: {{ chart_data.labels | tojson }},
        datasets: [
            {
                label: "Monthly Tons",
                data: {{ chart_data.monthly | tojson }},
                yAxisID: "y"
            },
            {
                label: "Cumulative Tons",
                data: {{ chart_data.cumulative | tojson }},
                type: "line",
                yAxisID: "y1",
                tension: 0.3
            }
        ]
    },
    options: {
        responsive: true,
        scales: {
            y: { beginAtZero: true },
            y1: {
                beginAtZero: true,
                position: "right",
                grid: { drawOnChartArea: false }
            }
        }
    }
});
{% endif %}
</script>

{% endblock %}
