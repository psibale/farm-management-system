{% extends "layout.html" %}

{% block content %}
<div class="container py-4">
    <h3 class="mb-4">📊 Mill Return — Daily Tonnage Graph</h3>

    <div class="card shadow-sm p-4">
        <canvas id="tonnageChart" height="120"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const ctx = document.getElementById('tonnageChart').getContext('2d');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: {{ dates | tojson }},
        datasets: [{
            label: 'Tons Delivered',
            data: {{ tons | tojson }},
            borderWidth: 2,
            borderColor: '#28a745',
            tension: 0.3,
            pointRadius: 3,
            pointHoverRadius: 5,
            fill: false
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: { display: true }
        },
        scales: {
            y: { beginAtZero: true }
        }
    }
});
</script>
{% endblock %}
