{% extends "layout.html" %}

{% block content %}
<div class="container mt-4">

    <div class="card shadow-lg border-0">
        <div class="card-header bg-warning text-dark d-flex justify-content-between align-items-center">
            <h4 class="mb-0">📦 Stores Issue Voucher</h4>
            <!-- Print button (only visible on screen) -->
            <button onclick="window.print()" class="btn btn-primary btn-sm d-print-none">
                🖨 Print
            </button>
        </div>

        <div class="card-body">

            <!-- REQUEST INFORMATION -->
            <div class="row mb-4">
                <div class="col-md-4">
                    <label class="form-label fw-bold">Service Request Number</label>
                    <input type="text" class="form-control" value="{{ sr_number }}" readonly>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-bold">Issue Date</label>
                    <input type="text" class="form-control" value="{{ date }}" readonly>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-bold">Issue Time</label>
                    <input type="text" class="form-control" value="{{ time }}" readonly>
                </div>
            </div>

            <form method="POST" action="{{ url_for('inventory.confirm_issue', sr_number=sr_number) }}">

                <!-- COLLECTOR DETAILS -->
                <h5 class="fw-bold mb-3">👤 Collector Details</h5>
                <div class="row mb-4">
                    <div class="col-md-4">
                        <label class="form-label">Collector Name</label>
                        <input type="text" name="collector" class="form-control" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Department / Section</label>
                        <input type="text" name="department" class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Pass-Out Authorization No.</label>
                        <input type="text" name="pass_out_no" class="form-control" value="{{ pass_out_no }}" readonly>
                    </div>
                </div>

                <!-- REQUESTED ITEMS -->
                <h5 class="fw-bold mb-3">📋 Items to Issue</h5>
                <div class="table-responsive">
                    <table class="table table-bordered table-striped">
                        <thead class="table-dark">
                            <tr>
                                <th>Item</th>
                                <th>Requested Qty</th>
                                <th>Unit</th>
                                <th>Issue Qty</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for r in requests %}
                            <tr>
                                <td>{{ r['ItemName'] }}</td>
                                <td>{{ r['Quantity'] }}</td>
                                <td>{{ r['Unit'] }}</td>
                                <td>
                                    <input type="number"
                                           name="issue_qty_{{ loop.index }}"
                                           class="form-control"
                                           value="{{ r['Quantity'] }}"
                                           min="1">
                                    <input type="hidden"
                                           name="item_{{ loop.index }}"
                                           value="{{ r['ItemName'] }}">
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>

                <!-- REMARKS -->
                <div class="mt-3">
                    <label class="form-label fw-bold">Remarks</label>
                    <textarea class="form-control"
                              name="remarks"
                              rows="3"
                              placeholder="Optional notes for this issue"></textarea>
                </div>

                <!-- BUTTONS (hidden when printing) -->
                <div class="mt-4 d-flex justify-content-between d-print-none">
                    <a href="{{ url_for('inventory.issue_page') }}" class="btn btn-secondary">
                        ⬅ Back
                    </a>
                    <button type="submit" class="btn btn-success btn-lg">
                        ✅ Confirm Issue
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- PRINT STYLING -->
<style>
    @media print {
        /* Hide buttons and card header in print */
        .btn, .card-header button {
            display: none !important;
        }
        body {
            background-color: #fff !important;
        }
        /* Table formatting for print */
        table {
            border-collapse: collapse !important;
            width: 100% !important;
        }
        th, td {
            border: 1px solid #000 !important;
            padding: 6px !important;
            font-size: 12pt;
        }
        input, textarea {
            border: none !important;
            font-size: 12pt;
        }
    }
</style>

{% endblock %}
