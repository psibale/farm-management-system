{% extends 'layout.html' %}
{% block content %}

<div class="container py-4">

<h3 class="fw-bold mb-4">🚚 Approved Requests Waiting for Issue</h3>

<table class="table table-striped">
<thead>
<tr>
<th>SR#</th>
<th>Item</th>
<th>Quantity</th>
<th>Requested By</th>
<th>Action</th>
</tr>
</thead>

<tbody>

{% for r in requests %}
<tr>

<td>{{ r['SRNumber'] }}</td>
<td>{{ r['ItemName'] }}</td>
<td>{{ r['Quantity'] }}</td>
<td>{{ r['RequestedBy'] }}</td>

<td>
<a href="{{ url_for('inventory.issue_form', sr_number=r['SRNumber']|string) }}"
   class="btn btn-warning btn-sm">
   🚚 Issue
</a>
</td>

</tr>
{% endfor %}

</tbody>
</table>

<!-- Back Button -->
<div class="mt-4">
<a href="{{ url_for('inventory.dashboard') }}" class="btn btn-secondary">
⬅ Back to Inventory Dashboard
</a>
</div>

</div>

{% endblock %}
