<!DOCTYPE html>
<html>
<head>
  <title>GIS Mapping</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>
  <style>#map { height: 80vh; }</style>
</head>
<body>
  <h2>Draw Field Polygon</h2>
  <form id="fieldForm">
    Field Name: <input type="text" id="field_name" required><br>
    Crop: <input type="text" id="crop"><br>
    Soil: <input type="text" id="soil"><br>
    <button type="submit">Save Polygon</button>
  </form>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
  <script>
    let map = L.map('map').setView([-13.9626, 33.7741], 8);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    const drawControl = new L.Control.Draw({
      draw: { polyline: false, rectangle: false, circle: false, marker: false },
      edit: { featureGroup: drawnItems }
    });
    map.addControl(drawControl);

    let geojson = null;
    map.on(L.Draw.Event.CREATED, function (event) {
      const layer = event.layer;
      drawnItems.clearLayers();
      drawnItems.addLayer(layer);
      geojson = layer.toGeoJSON();
    });

    document.getElementById("fieldForm").addEventListener("submit", function (e) {
      e.preventDefault();
      if (!geojson) return alert("Please draw a polygon first.");
      const payload = {
        field_name: document.getElementById("field_name").value,
        crop: document.getElementById("crop").value,
        soil: document.getElementById("soil").value,
        geojson: { type: "FeatureCollection", features: [geojson] }
      };

      fetch("/save_polygon", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      }).then(r => r.json())
        .then(data => alert(data.message || data.error));
    });
  </script>
</body>
</html>
