<!DOCTYPE html>
<html>
<head>
    <title>Inventory Logs</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h3>📜 Inventory Issuance Logs</h3>
    {% if logs %}
    <table class="table table-bordered mt-3">
        <thead class="table-light">
            <tr>
                <th>Date</th>
                <th>Item Name</th>
                <th>Quantity Issued</th>
                <th>Issued To</th>
                <th>Remarks</th>
            </tr>
        </thead>
        <tbody>
            {% for log in logs %}
            <tr>
                <td>{{ log.Date }}</td>
                <td>{{ log.ItemName }}</td>
                <td>{{ log.QuantityIssued }}</td>
                <td>{{ log.IssuedTo }}</td>
                <td>{{ log.Remarks }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
    <p>No issuance logs found.</p>
    {% endif %}
    <a href="{{ url_for('inventory.dashboard') }}" class="btn btn-secondary mt-3">⬅ Back to Dashboard</a>
</div>
</body>
</html>
