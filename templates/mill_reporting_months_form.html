{% extends 'layout.html' %}
{% block content %}
<div class="container py-4">
    <h3 class="mb-4">{{ title }}</h3>

    <table class="table table-bordered table-striped align-middle">
        <thead class="table-dark">
            <tr>
                <th>Month</th>
                <th>Start Date</th>
                <th>End Date</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for m in months %}
            <tr>
                <form method="POST">
                    <td>{{ m['Month'] }}</td>
                    <td><input type="date" class="form-control" name="start_date" value="{{ m['Start Date']|string|truncate(10,false,'') }}"></td>
                    <td><input type="date" class="form-control" name="end_date" value="{{ m['End Date']|string|truncate(10,false,'') }}"></td>
                    <td>
                        <input type="hidden" name="month" value="{{ m['Month'] }}">
                        {% if session['role'] in ['Mill & Safety', 'Admin'] %}
                        <button type="submit" class="btn btn-sm btn-success">Update</button>
                        {% endif %}
                    </td>
                </form>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<div class="d-flex flex-wrap gap-2 mt-4">
        <a href="{{ url_for('mill_reports.mill_reports_dashboard') }}" class="btn btn-outline-dark">⬅️ Back</a>
</div>
{% endblock %}
