{% extends 'layout.html' %}

{% block content %}

<div class="container py-4">

<h3 class="mb-4">🌾 Variety Register</h3>

<div class="card shadow-sm">

<div class="card-body">

<div class="table-responsive">

<table class="table table-hover table-bordered">

<thead class="table-primary">

<tr>
<th>Variety</th>
<th>Maturity Months</th>
<th>Expected TCH</th>
<th>Status</th>
<th>Remarks</th>
</tr>

</thead>

<tbody>

{% for row in records %}
<tr>
<td>{{ row['Variety'] }}</td>
<td>{{ row['Maturity Months'] }}</td>
<td>{{ row['Expected TCH'] }}</td>
<td>{{ row['Status'] }}</td>
<td>{{ row['Remarks'] }}</td>
</tr>
{% endfor %}

</tbody>

</table>

</div>

</div>

</div>
<a href="{{ url_for('agriculture.variety_management') }}"
   class="btn btn-secondary mt-4">
   ← Back
</a>
</div>

{% endblock %}
