<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title if title else "Farm Management System" }}</title>

    <!-- Bootstrap (if not already globally loaded) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            background-color: #f4f6f9;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }

        .app-layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #1f2933, #111827);
            color: #fff;
            padding: 20px 15px;
        }

        .sidebar h4 {
            font-weight: 700;
            margin-bottom: 25px;
            text-align: center;
        }

        .sidebar a {
            display: block;
            padding: 10px 14px;
            margin-bottom: 8px;
            border-radius: 8px;
            color: #e5e7eb;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .sidebar a:hover {
            background-color: rgba(255,255,255,0.1);
            color: #fff;
            transform: translateX(4px);
        }

        .sidebar .divider {
            border-top: 1px solid rgba(255,255,255,0.15);
            margin: 15px 0;
        }

        /* Content */
        .content {
            flex-grow: 1;
            padding: 25px 30px;
        }

        /* Top utility bar inside content */
        .page-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .back-btn {
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="app-layout">

    <!-- ================= SIDEBAR ================= -->
    <div class="sidebar">

        <h4>🌱 Farm System</h4>

        <!-- Smart Back Button -->
        <a href="javascript:void(0);" onclick="window.history.back();" class="back-btn">
            ← Back to Previous Page
        </a>

        <div class="divider"></div>

        <!-- Home / Dashboard -->
        <a href="{{ url_for('dashboard') }}">
            🏠 Main Dashboard
        </a>

        <!-- Optional future links -->
        <!--
        <a href="#">📊 Reports</a>
        <a href="#">⚙ Settings</a>
        -->

    </div>

    <!-- ================= MAIN CONTENT ================= -->
    <div class="content">

        <!-- Optional top bar for page-specific tools -->
        <div class="page-tools">
            <div></div>
            <div class="text-muted small">
                {{ title if title else "" }}
            </div>
        </div>

        {% block content %}{% endblock %}

    </div>

</div>

</body>
</html>
