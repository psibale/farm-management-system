<!DOCTYPE html>
<html>
<head>
    <title>HR Configuration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding: 40px;
        }
        .table th, .table td {
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>HR Configuration - Pay Grades & Leave Allocations</h2>
        <form method="post">
            <table class="table table-bordered table-hover mt-4">
                <thead class="table-dark">
                    <tr>
                        <th>Grade</th>
                        <th>Basic Rate (per day)</th>
                        <th>Overtime Rate (per hour)</th>
                        <th>NHIF (%)</th>
                        <th>NSSF (%)</th>
                        <th>Annual Leave Days</th>
                        <th>Sick Leave Days</th>
                        <th>Maternity Leave Days</th>
                        <th>Other Deductions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for row in rules %}
                    <tr>
                        <td><input type="text" name="grade_{{ loop.index0 }}" value="{{ row['Grade'] }}" class="form-control" required></td>
                        <td><input type="number" step="0.01" name="basic_{{ loop.index0 }}" value="{{ row['Basic Rate (per day)'] }}" class="form-control" required></td>
                        <td><input type="number" step="0.01" name="overtime_{{ loop.index0 }}" value="{{ row['Overtime Rate (per hour)'] }}" class="form-control"></td>
                        <td><input type="number" step="0.01" name="nhif_{{ loop.index0 }}" value="{{ row['NHIF (%)'] }}" class="form-control"></td>
                        <td><input type="number" step="0.01" name="nssf_{{ loop.index0 }}" value="{{ row['NSSF (%)'] }}" class="form-control"></td>
                        <td><input type="number" name="annual_{{ loop.index0 }}" value="{{ row.get('Annual Leave Days', 0) }}" class="form-control"></td>
                        <td><input type="number" name="sick_{{ loop.index0 }}" value="{{ row.get('Sick Leave Days', 0) }}" class="form-control"></td>
                        <td><input type="number" name="maternity_{{ loop.index0 }}" value="{{ row.get('Maternity Leave Days', 0) }}" class="form-control"></td>
                        <td><input type="text" name="other_{{ loop.index0 }}" value="{{ row.get('Other Deduction Rules', '') }}" class="form-control"></td>
                    </tr>
                    {% endfor %}

                    <!-- Empty row for new grade -->
                    <tr class="table-info">
                        <td><input type="text" name="grade_new" class="form-control" placeholder="New Grade"></td>
                        <td><input type="number" step="0.01" name="basic_new" class="form-control"></td>
                        <td><input type="number" step="0.01" name="overtime_new" class="form-control"></td>
                        <td><input type="number" step="0.01" name="nhif_new" class="form-control"></td>
                        <td><input type="number" step="0.01" name="nssf_new" class="form-control"></td>
                        <td><input type="number" name="annual_new" class="form-control"></td>
                        <td><input type="number" name="sick_new" class="form-control"></td>
                        <td><input type="number" name="maternity_new" class="form-control"></td>
                        <td><input type="text" name="other_new" class="form-control"></td>
                    </tr>
                </tbody>
            </table>

            <button type="submit" class="btn btn-success mt-3">💾 Save Configurations</button>
            <a href="{{ url_for('hr.hr_home') }}" class="btn btn-secondary mt-3">← Back to HR Home</a>
        </form>
    </div>
</body>
</html>
