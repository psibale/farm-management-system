<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance Tracking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script>
        let rowCount = 2;

        // Load empDict dynamically from Flask
        const empDict = {{ emp_dict | tojson | safe }};

        function autofillName(rowNum) {
            const empNumber = document.getElementById(`emp_number_${rowNum}`).value;
            const empName = empDict[empNumber] || "";
            document.getElementById(`emp_name_${rowNum}`).value = empName;
        }

        function copySharedFields(rowNum) {
            const fields = ['date', 'farm', 'activity', 'supervisor', 'location'];
            fields.forEach(field => {
                const source = document.getElementById(`${field}_1`).value;
                document.getElementById(`${field}_${rowNum}`).value = source;
            });
        }

        function addRow() {
            rowCount++;
            const table = document.getElementById("attendance_table").getElementsByTagName('tbody')[0];
            const row = table.insertRow();

            const sharedFields = {
                date: 'date',
                emp_number: 'text',
                emp_name: 'text',
                basic: 'number',
                overtime: 'number',
                farm: 'text',
                activity: 'text',
                supervisor: 'text',
                location: 'text'
            };

            let colIndex = 0;
            for (let field in sharedFields) {
                const cell = row.insertCell(colIndex++);
                const input = document.createElement("input");
                input.type = sharedFields[field] === 'number' ? 'number' :
                             field === 'date' ? 'date' : 'text';
                input.className = "form-control";
                input.name = `${field}_${rowCount}`;
                input.id = `${field}_${rowCount}`;
                if (field === 'emp_name') {
                    input.readOnly = true;
                }
                if (field === 'emp_number') {
                    input.setAttribute("oninput", `autofillName(${rowCount})`);
                }
                if (['date', 'farm', 'activity', 'supervisor', 'location'].includes(field)) {
                    setTimeout(() => copySharedFields(rowCount), 10); // ensure DOM is ready
                }
                cell.appendChild(input);
            }
        }

        function setupAutoCopy() {
            const fields = ['date_1', 'farm_1', 'activity_1', 'supervisor_1', 'location_1'];
            fields.forEach(id => {
                document.getElementById(id).addEventListener('change', () => {
                    for (let i = 2; i <= rowCount; i++) {
                        copySharedFields(i);
                    }
                });
            });
        }

        window.onload = setupAutoCopy;
    </script>
</head>
<body class="container py-4">
    <h2 class="mb-4">Attendance Tracking</h2>

    <form method="post" action="{{ url_for('hr.attendance_tracking') }}">
        <table class="table table-bordered" id="attendance_table">
            <thead class="table-light">
                <tr>
                    <th>Date</th>
                    <th>Employee Number</th>
                    <th>Employee Name</th>
                    <th>Basic Earnings</th>
                    <th>Overtime</th>
                    <th>Farm Number</th>
                    <th>Activity/Remarks</th>
                    <th>Supervisor</th>
                    <th>Location</th>
                </tr>
            </thead>
            <tbody>
                <!-- Row 1 -->
                <tr>
                    <td><input type="date" class="form-control" id="date_1" name="date_1" required></td>
                    <td><input type="text" class="form-control" id="emp_number_1" name="emp_number_1" oninput="autofillName(1)" required></td>
                    <td><input type="text" class="form-control" id="emp_name_1" name="emp_name_1" readonly></td>
                    <td><input type="number" class="form-control" name="basic_1" step="0.01"></td>
                    <td><input type="number" class="form-control" name="overtime_1" step="0.01"></td>
                    <td><input type="text" class="form-control" id="farm_1" name="farm_1"></td>
                    <td><input type="text" class="form-control" id="activity_1" name="activity_1"></td>
                    <td><input type="text" class="form-control" id="supervisor_1" name="supervisor_1"></td>
                    <td><input type="text" class="form-control" id="location_1" name="location_1"></td>
                </tr>

                <!-- Row 2 -->
                <tr>
                    <td><input type="date" class="form-control" id="date_2" name="date_2"></td>
                    <td><input type="text" class="form-control" id="emp_number_2" name="emp_number_2" oninput="autofillName(2)"></td>
                    <td><input type="text" class="form-control" id="emp_name_2" name="emp_name_2" readonly></td>
                    <td><input type="number" class="form-control" name="basic_2" step="0.01"></td>
                    <td><input type="number" class="form-control" name="overtime_2" step="0.01"></td>
                    <td><input type="text" class="form-control" id="farm_2" name="farm_2"></td>
                    <td><input type="text" class="form-control" id="activity_2" name="activity_2"></td>
                    <td><input type="text" class="form-control" id="supervisor_2" name="supervisor_2"></td>
                    <td><input type="text" class="form-control" id="location_2" name="location_2"></td>
                </tr>
            </tbody>
        </table>

        <div class="mb-3">
            <button type="button" class="btn btn-outline-primary" onclick="addRow()">➕ Add Row</button>
        </div>

        <button type="submit" class="btn btn-success">Submit Attendance</button>
        <a href="{{ url_for('hr.hr_home') }}" class="btn btn-secondary">Back</a>
    </form>
</body>
</html>
