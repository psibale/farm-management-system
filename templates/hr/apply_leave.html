<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apply for Leave</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        let leaveBalances = {};

        window.addEventListener("DOMContentLoaded", () => {
            leaveBalances = JSON.parse(document.getElementById("leave_balances_data").textContent);

            document.getElementById("emp_id").addEventListener("change", updateFormFields);
            document.getElementById("leave_type").addEventListener("change", updateLeaveBalance);
            document.getElementById("start_date").addEventListener("change", calculateLeaveDays);
            document.getElementById("end_date").addEventListener("change", calculateLeaveDays);
        });

        function updateFormFields() {
            const empSelect = document.getElementById("emp_id");
            const selected = empSelect.selectedOptions[0];
            document.getElementById("name").value = selected.dataset.name || '';
            document.getElementById("grade").value = selected.dataset.grade || '';
            updateLeaveBalance();
        }

        function updateLeaveBalance() {
            const empId = document.getElementById("emp_id").value;
            const leaveType = document.getElementById("leave_type").value;
            const balance = (leaveBalances[empId] && leaveBalances[empId][leaveType]) || 0;
            document.getElementById("leave_balance").value = balance;
            calculateLeaveDays(); // recalculate when leave type changes
        }

        function calculateLeaveDays() {
            const start = new Date(document.getElementById("start_date").value);
            const end = new Date(document.getElementById("end_date").value);
            const empId = document.getElementById("emp_id").value;
            const leaveType = document.getElementById("leave_type").value;

            const warningEl = document.getElementById("warning");

            if (start && end && !isNaN(start) && !isNaN(end)) {
                const diffTime = end - start;
                const days = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;

                if (days > 0) {
                    document.getElementById("days_requested").value = days;

                    const balance = (leaveBalances[empId] && leaveBalances[empId][leaveType]) || 0;

                    if (days > balance && leaveType !== "Unpaid") {
                        warningEl.textContent = "⚠️ Requested days exceed available leave balance!";
                        document.querySelector("button[type=submit]").disabled = true;
                    } else {
                        warningEl.textContent = "";
                        document.querySelector("button[type=submit]").disabled = false;
                    }
                } else {
                    document.getElementById("days_requested").value = '';
                    warningEl.textContent = "⚠️ End Date must be after Start Date.";
                    document.querySelector("button[type=submit]").disabled = true;
                }
            } else {
                document.getElementById("days_requested").value = '';
                warningEl.textContent = "";
                document.querySelector("button[type=submit]").disabled = false;
            }
        }
    </script>
</head>
<body class="container py-4">
    <h3>Leave Application Form</h3>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" class="row g-3 mt-3">
        <div class="col-md-4">
            <label class="form-label">Employee ID</label>
            <select name="emp_id" id="emp_id" class="form-select" required>
                <option value="">-- Select Employee --</option>
                {% for id, name, grade in emp_options %}
                <option value="{{ id }}" data-name="{{ name }}" data-grade="{{ grade }}">{{ id }} - {{ name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label">Employee Name</label>
            <input type="text" name="name" id="name" class="form-control" readonly>
        </div>
        <div class="col-md-4">
            <label class="form-label">Employee Grade</label>
            <input type="text" name="grade" id="grade" class="form-control" readonly>
        </div>
        <div class="col-md-4">
            <label class="form-label">Leave Type</label>
            <select name="leave_type" id="leave_type" class="form-select" required>
                <option value="">-- Select Type --</option>
                <option value="Annual">Annual</option>
                <option value="Sick">Sick</option>
                <option value="Maternity">Maternity</option>
                <option value="Compassionate">Compassionate</option>
                <option value="Unpaid">Unpaid</option>
            </select>
        </div>
        <div class="col-md-2">
            <label class="form-label">Start Date</label>
            <input type="date" name="start_date" id="start_date" class="form-control" required>
        </div>
        <div class="col-md-2">
            <label class="form-label">End Date</label>
            <input type="date" name="end_date" id="end_date" class="form-control" required>
        </div>
        <div class="col-md-2">
            <label class="form-label">Days Requested</label>
            <input type="text" id="days_requested" class="form-control" readonly>
        </div>
        <div class="col-md-2">
            <label class="form-label">Leave Balance</label>
            <input type="text" id="leave_balance" class="form-control" readonly>
        </div>
        <div class="col-md-6">
            <label class="form-label">Reason</label>
            <input type="text" name="reason" class="form-control" required>
        </div>
        <div class="col-12 text-end">
            <p id="warning" class="text-danger fw-bold"></p>
            <button type="submit" class="btn btn-primary">Submit Leave Application</button>
            <a href="{{ url_for('hr.hr_home') }}" class="btn btn-secondary">Back</a>
        </div>
    </form>

    <script id="leave_balances_data" type="application/json">
        {{ leave_balances | tojson | safe }}
    </script>
</body>
</html>
