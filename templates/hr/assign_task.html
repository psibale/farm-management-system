<!DOCTYPE html>
<html>
<head>
    <title>Assign Task</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
</head>
<body class="container mt-5">
    <h2 class="mb-4">📋 Assign Task to Employee</h2>
    <form method="POST">
        <div class="mb-3">
            <label for="date" class="form-label">Date</label>
            <input type="date" class="form-control" name="date" required>
        </div>
        <div class="mb-3">
            <label for="employee_id" class="form-label">Employee ID</label>
            <input type="text" class="form-control" name="employee_id" required>
        </div>
        <div class="mb-3">
            <label for="task_description" class="form-label">Task Description</label>
            <textarea class="form-control" name="task_description" rows="3" required></textarea>
        </div>
        <div class="mb-3">
            <label for="deadline" class="form-label">Deadline</label>
            <input type="date" class="form-control" name="deadline" required>
        </div>
        <div class="mb-3">
            <label for="assigned_by" class="form-label">Assigned By</label>
            <input type="text" class="form-control" name="assigned_by" required>
        </div>
        <button type="submit" class="btn btn-primary">Assign Task</button>
        <a href="{{ url_for('hr.hr_home') }}" class="btn btn-secondary">Back</a>
    </form>
</body>
</html>
