{% extends 'layout.html' %}
{% block content %}
<div class="container py-5">
    <h3 class="mb-4">📝 Request Inventory Item</h3>

    {% if sr_number %}
    <div class="alert alert-success">
        ✅ Your request has been submitted.<br>
        <strong>SR#:</strong> <span class="text-primary fs-5">{{ sr_number }}</span><br>
        Please provide this number when collecting your item.
    </div>
    {% endif %}

    <form method="post" class="card p-4 shadow-sm" style="max-width: 600px;">
        <div class="mb-3">
            <label for="item_name" class="form-label">Item Name</label>
            <input type="text" class="form-control" id="item_name" name="item_name" required>
        </div>

        <div class="mb-3">
            <label for="quantity" class="form-label">Quantity Needed</label>
            <input type="number" class="form-control" id="quantity" name="quantity" min="1" required>
        </div>

        <div class="mb-3">
            <label for="reason" class="form-label">Reason for Request</label>
            <textarea class="form-control" id="reason" name="reason" rows="3" required></textarea>
        </div>

        <div class="d-flex justify-content-between">
            <button type="submit" class="btn btn-primary">📤 Submit Request</button>
            <a href="{{ url_for('inventory.dashboard') }}" class="btn btn-secondary">⬅ Back</a>
        </div>
    </form>
</div>
{% endblock %}
